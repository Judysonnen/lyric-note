  let loginBusy = false;
  const fieldTouched = {}; // track which fields have been interacted with

  function clearFieldStatuses() {
    document.querySelectorAll('.field-status').forEach(el => { el.textContent = ''; el.className = 'field-status'; });
    document.querySelectorAll('.login-input').forEach(el => { el.classList.remove('has-error', 'is-valid'); el.removeAttribute('aria-invalid'); });
    document.getElementById('login-error').textContent = '';
    Object.keys(fieldTouched).forEach(k => delete fieldTouched[k]);
  }
  function setFieldStatus(inputId, statusId, msg, type) {
    // type: 'error' | 'valid' | 'hint'
    const input = document.getElementById(inputId);
    const el = document.getElementById(statusId);
    if (input) {
      input.classList.remove('has-error', 'is-valid');
      input.removeAttribute('aria-invalid');
      if (type === 'error') { input.classList.add('has-error'); input.setAttribute('aria-invalid', 'true'); }
      else if (type === 'valid') input.classList.add('is-valid');
      // hint: no border change
    }
    if (el) {
      el.className = 'field-status visible ' + type;
      el.textContent = msg;
    }
  }
  function clearFieldStatus(inputId, statusId) {
    const input = document.getElementById(inputId);
    const el = document.getElementById(statusId);
    if (input) { input.classList.remove('has-error', 'is-valid'); input.removeAttribute('aria-invalid'); }
    if (el) { el.textContent = ''; el.className = 'field-status'; }
  }
  function setLoginBusy(busy) {
    loginBusy = busy;
    document.querySelectorAll('.login-actions .btn').forEach(b => {
      b.disabled = busy;
      b.style.opacity = busy ? '0.6' : '';
    });
  }
  function togglePwVisibility(inputId, btn) {
    const input = document.getElementById(inputId);
    if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
    else { input.type = 'password'; btn.textContent = '👁'; }
  }

  // Real-time field validation
  function validateField(inputId, hintOnly) {
    // hintOnly=true: show grey hint, don't mark as error (used on focus before typing)
    const el = document.getElementById(inputId);
    if (!el) return true;
    const val = el.value;
    const trimVal = val.trim();
    if (inputId === 'login-username') {
      const sid = 'status-username';
      if (!trimVal) {
        if (hintOnly && registerMode) { setFieldStatus(inputId, sid, '至少 2 位', 'hint'); return false; }
        if (hintOnly) return false;
        setFieldStatus(inputId, sid, '请输入', 'error'); return false;
      }
      if (registerMode && trimVal.length < 2) { setFieldStatus(inputId, sid, '至少 2 位', hintOnly ? 'hint' : 'error'); return false; }
      setFieldStatus(inputId, sid, '✓', 'valid'); return true;
    }
    if (inputId === 'login-password') {
      const sid = 'status-password';
      if (!val) {
        if (hintOnly && registerMode) { setFieldStatus(inputId, sid, '至少 6 位', 'hint'); return false; }
        if (hintOnly) return false;
        setFieldStatus(inputId, sid, '请输入', 'error'); return false;
      }
      if (registerMode && val.length < 6) { setFieldStatus(inputId, sid, '至少 6 位', hintOnly ? 'hint' : 'error'); return false; }
      setFieldStatus(inputId, sid, '✓', 'valid');
      if (registerMode && fieldTouched['login-password-confirm']) validateField('login-password-confirm');
      return true;
    }
    if (inputId === 'login-password-confirm') {
      const sid = 'status-confirm';
      const pw = document.getElementById('login-password').value;
      if (!val) {
        if (hintOnly) { setFieldStatus(inputId, sid, '再次输入', 'hint'); return false; }
        setFieldStatus(inputId, sid, '请输入', 'error'); return false;
      }
      if (pw && val !== pw) { setFieldStatus(inputId, sid, '不一致', hintOnly ? 'hint' : 'error'); return false; }
      if (pw && val === pw) { setFieldStatus(inputId, sid, '✓', 'valid'); return true; }
      clearFieldStatus(inputId, sid); return true;
    }
    return true;
  }

  async function doLogin() {
    if (registerMode) { resetRegisterMode(); return; }
    if (loginBusy) return;
    document.getElementById('login-error').textContent = '';
    // Mark all as touched and validate
    fieldTouched['login-username'] = true;
    fieldTouched['login-password'] = true;
    const v1 = validateField('login-username');
    const v2 = validateField('login-password');
    if (!v1 || !v2) {
      if (!v1) document.getElementById('login-username').focus();
      else document.getElementById('login-password').focus();
      return;
    }
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    setLoginBusy(true);
    try {
      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: toEmail(username), password
      });
      if (error) throw error;
      onAuthSuccess(data.user);
    } catch(e) {
      const msg = e?.message || '未知错误';
      document.getElementById('login-error').textContent = msg === 'Invalid login credentials'
        ? '用户名或密码错误' : '登录失败: ' + msg;
    } finally { setLoginBusy(false); }
  }

  let registerMode = false;

  function handleRegister() {
    if (loginBusy) return;
    if (!registerMode) {
      clearFieldStatuses();
      registerMode = true;
      const cf = document.getElementById('confirm-field');
      cf.classList.add('show');
      document.getElementById('login-password-confirm').tabIndex = 0;
      document.getElementById('register-btn').textContent = '确认注册';
      const u = document.getElementById('login-username');
      const p = document.getElementById('login-password');
      const c = document.getElementById('login-password-confirm');
      if (!u.value.trim()) u.focus();
      else if (!p.value) p.focus();
      else c.focus();
      return;
    }
    doRegister();
  }

  async function doRegister() {
    if (loginBusy) return;
    document.getElementById('login-error').textContent = '';
    const errEl = document.getElementById('login-error');
    // Mark all as touched and validate
    ['login-username','login-password','login-password-confirm'].forEach(id => { fieldTouched[id] = true; });
    const v1 = validateField('login-username');
    const v2 = validateField('login-password');
    const v3 = validateField('login-password-confirm');
    if (!v1 || !v2 || !v3) {
      const firstBad = !v1 ? 'login-username' : !v2 ? 'login-password' : 'login-password-confirm';
      document.getElementById(firstBad).focus();
      return;
    }
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    setLoginBusy(true);
    try {
      const { data, error } = await supabaseClient.auth.signUp({
        email: toEmail(username), password,
        options: { data: { display_name: username } }
      });
      if (error) throw error;
      if (data.user) {
        resetRegisterMode();
        onAuthSuccess(data.user);
      }
    } catch(e) {
      const msg = e?.message || '未知错误';
      if (msg.includes('already registered')) {
        errEl.textContent = '该用户名已被注册';
      } else {
        errEl.textContent = '注册失败: ' + msg;
      }
    } finally { setLoginBusy(false); }
  }

  function resetRegisterMode() {
    registerMode = false;
    const confirmField = document.getElementById('confirm-field');
    if (confirmField) confirmField.classList.remove('show');
    const confirmInput = document.getElementById('login-password-confirm');
    if (confirmInput) { confirmInput.value = ''; confirmInput.tabIndex = -1; }
    const btn = document.getElementById('register-btn');
    if (btn) btn.textContent = '注册';
    clearFieldStatuses();
  }

  async function doLogout() {
    if (!confirm('确定退出登录？')) return;
    await supabaseClient.auth.signOut();
  }

  function setupLoginKeyboard() {
    const fieldMap = {
      'login-username': 'status-username',
      'login-password': 'status-password',
      'login-password-confirm': 'status-confirm'
    };
    Object.entries(fieldMap).forEach(([id, sid]) => {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener('focus', () => {
        if (!fieldTouched[id] && registerMode) validateField(id, true);
      });
      el.addEventListener('input', () => {
        document.getElementById('login-error').textContent = '';
        if (el.value && registerMode) fieldTouched[id] = true;
        if (fieldTouched[id]) validateField(id);
        else if (registerMode) validateField(id, true);
      });
      el.addEventListener('blur', () => {
        if (el.value) { fieldTouched[id] = true; validateField(id); }
        else if (!fieldTouched[id]) clearFieldStatus(id, sid);
      });
      el.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); if (registerMode) doRegister(); else doLogin(); }
        if (e.key === 'Escape' && registerMode) { e.preventDefault(); resetRegisterMode(); }
      });
    });
  }

  async function pullFromCloud() {
    if (!supabaseClient || !cloudUser) return;
    try {
      const { data, error } = await supabaseClient.from('projects')
        .select('id, data, updated_at')
        .eq('user_id', cloudUser.id);
      if (error) throw error;
      if (!data) return;
      data.forEach(row => {
        const projData = row.data;
        const id = row.id;
        const localRaw = localStorage.getItem('lyricnote_project_' + id);
        const localData = localRaw ? JSON.parse(localRaw) : null;
        if (!localData || (projData.updatedAt || 0) > (localData.updatedAt || 0)) {
          localStorage.setItem('lyricnote_project_' + id, JSON.stringify(projData));
          const index = getProjectIndex();
          const existing = index.find(e => e.id === id);
          if (existing) {
            existing.name = projData.name || projData.songTitle || '未命名';
            existing.studentName = projData.studentName || '';
            existing.lessonDate = projData.lessonDate || '';
            existing.updatedAt = projData.updatedAt;
          } else {
            index.unshift({ id, name: projData.name || projData.songTitle || '未命名', studentName: projData.studentName || '', lessonDate: projData.lessonDate || '', createdAt: projData.createdAt || projData.updatedAt, updatedAt: projData.updatedAt });
          }
          saveProjectIndex(index);
          if (currentProjectId === id) loadProject(id);
        }
      });
      // Remove local projects deleted from cloud
      const cloudIds = new Set(data.map(r => r.id));
      const localIndex = getProjectIndex();
      const toRemove = localIndex.filter(p => !cloudIds.has(p.id));
      if (toRemove.length) {
        toRemove.forEach(p => localStorage.removeItem('lyricnote_project_' + p.id));
        saveProjectIndex(localIndex.filter(p => cloudIds.has(p.id)));
        if (currentProjectId && !cloudIds.has(currentProjectId)) {
          currentProjectId = null; resetEditorState(); showHomeScreen();
        }
      }
      if (document.getElementById('home-screen').style.display !== 'none') renderHomeScreen();
    } catch(e) {
      console.error('Pull from cloud error:', e);
    }
  }

  function startCloudPoll() {
    stopCloudPoll();
    cloudPollTimer = setInterval(() => { if (!cloudSyncing) pullFromCloud(); }, 30000);
  }
  function stopCloudPoll() {
    if (cloudPollTimer) { clearInterval(cloudPollTimer); cloudPollTimer = null; }
  }

  async function cloudSaveProject(projectId) {
    if (!supabaseClient || !cloudUser || cloudSyncing) return;
    const raw = localStorage.getItem('lyricnote_project_' + projectId);
    if (!raw) return;
    const data = JSON.parse(raw);
    const now = Date.now();
    if (now - lastCloudWrite < 500) {
      clearTimeout(cloudSaveProject._timer);
      cloudSaveProject._timer = setTimeout(() => cloudSaveProject(projectId), 600);
      return;
    }
    lastCloudWrite = now;
    cloudSyncing = true;
    showCloudSyncing();
    try {
      const { error } = await supabaseClient.from('projects').upsert({
        id: projectId,
        user_id: cloudUser.id,
        data: data,
        updated_at: data.updatedAt || now
      });
      if (error) throw error;
      showCloudSynced();
    } catch(e) {
      console.error('Cloud save error:', e);
    }
    cloudSyncing = false;
  }

  async function cloudDeleteProject(projectId) {
    if (!supabaseClient || !cloudUser) return;
    try {
      await supabaseClient.from('projects').delete().eq('id', projectId).eq('user_id', cloudUser.id);
    } catch(e) {
      console.error('Cloud delete error:', e);
    }
  }

  async function pushLocalToCloud() {
    if (!supabaseClient || !cloudUser) return;
    const index = getProjectIndex();
    for (const entry of index) {
      const raw = localStorage.getItem('lyricnote_project_' + entry.id);
      if (raw) {
        const data = JSON.parse(raw);
        try {
          await supabaseClient.from('projects').upsert({
            id: entry.id,
            user_id: cloudUser.id,
            data: data,
            updated_at: data.updatedAt || Date.now()
          });
        } catch(e) { console.error('Push error:', e); }
      }
    }
  }

  function updateCloudDot() {
    const homeStatus = document.getElementById('home-cloud-status');
    if (homeStatus) {
      const name = cloudUser ? (cloudUser.user_metadata?.display_name || cloudUser.email.split('@')[0]) : '';
      if (cloudConnected) {
        homeStatus.className = 'home-cloud-status';
        homeStatus.innerHTML = '<span class="cloud-dot"></span> ' + (name ? name + ' · 已连接云端' : '已连接云端') +
          (cloudUser ? ' <button class="user-badge" onclick="doLogout()" title="退出登录"><span class="user-logout">退出</span></button>' : '');
      } else {
        homeStatus.className = 'home-cloud-status offline';
        homeStatus.innerHTML = '<span class="cloud-dot"></span> 离线模式';
      }
    }
  }
  let _cloudIndicatorTimer = null;
  function showCloudSynced() {
    const el = document.getElementById('cloud-indicator');
    if (!el) return;
    clearTimeout(_cloudIndicatorTimer);
    el.className = 'cloud-status show';
    el.innerHTML = '<span class="cloud-dot"></span> ☁ 已同步';
    _cloudIndicatorTimer = setTimeout(() => { el.classList.remove('show'); }, 2000);
  }
  function showCloudSyncing() {
    const el = document.getElementById('cloud-indicator');
    if (!el) return;
    clearTimeout(_cloudIndicatorTimer);
    el.className = 'cloud-status syncing show';
    el.innerHTML = '<span class="cloud-dot"></span> 同步中…';
  }

  init();
