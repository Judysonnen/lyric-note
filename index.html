<script>
  // ─── State ───────────────────────────────────────────
  let lyrics = '';
  let songTitle = '';
  let annotations = []; // {id, charIndex, length, type, color?, content?, style?}
  let sections    = []; // {id, lineIndex, tag}
  let selRange = null;
  let isSelecting = false;
  let recognition = null;
  let isNoteRecording = false;
  let activeNoteId = null;
  let editingNoteId = null;
  let noteBaseText = '';
  let exportFormat = 'pdf';
  let pendingCustomColor = null;
  let sectionMode = false;
  let activeSectionLine = null;
  let isEditMode = false; // true = editing existing lyrics

  const ZOOM_LEVELS = [0.65, 0.8, 1.0, 1.25, 1.55];
  let zoomIndex = 2;

  const DEFAULT_PALETTE = ['#FFF59D','#B3E5FC','#C8E6C9','#F8BBD0'];
  let palette = loadPalette();
  let paletteEditMode = false;

  const SECTION_TAGS = [
    { id:'intro',     label:'引子',  cls:'sl-intro',     color:'#64748B' },
    { id:'verse',     label:'主歌',  cls:'sl-verse',     color:'#2563EB' },
    { id:'prechorus', label:'预副歌',cls:'sl-prechorus',  color:'#EA580C' },
    { id:'chorus',    label:'副歌',  cls:'sl-chorus',    color:'#E11D48' },
    { id:'bridge',    label:'桥段',  cls:'sl-bridge',    color:'#7C3AED' },
    { id:'interlude', label:'间奏',  cls:'sl-interlude', color:'#059669' },
    { id:'outro',     label:'尾声',  cls:'sl-outro',     color:'#475569' },
  ];

  // ─── Init ─────────────────────────────────────────────
  function init() {
    setupSpeechRecognition();
    setupCustomColorPicker();
    buildSectionPicker();
    renderPalette();
    renderLyrics();
    renderSongTitleDisplay();
    updateZoomUI();
    initNotesPanel();
    document.addEventListener('click', onDocClick);
  }

  function onDocClick(e) {
    // Close section picker if click outside
    const picker = document.getElementById('section-picker');
    if (picker.classList.contains('visible') && !picker.contains(e.target) && !e.target.closest('.section-trigger-btn') && !e.target.closest('.section-label')) {
      closeSectionPicker();
    }
  }

  // ─── Zoom ─────────────────────────────────────────────
  function adjustZoom(delta) {
    zoomIndex = Math.max(0, Math.min(ZOOM_LEVELS.length - 1, zoomIndex + delta));
    document.documentElement.style.setProperty('--font-scale', ZOOM_LEVELS[zoomIndex]);
    updateZoomUI();
  }
  function updateZoomUI() {
    const pct = Math.round(ZOOM_LEVELS[zoomIndex] * 100);
    document.getElementById('zoom-label').textContent = pct + '%';
    document.getElementById('zoom-out-btn').disabled = zoomIndex === 0;
    document.getElementById('zoom-in-btn').disabled  = zoomIndex === ZOOM_LEVELS.length - 1;
  }

  // ─── Song Title ────────────────────────────────────────
  function renderSongTitleDisplay() {
    const el = document.getElementById('song-title-display');
    if (el) {
      if (songTitle) {
        el.textContent = songTitle; el.classList.remove('placeholder'); el.title = '点击编辑';
      } else {
        el.textContent = '+ 添加歌名'; el.classList.add('placeholder'); el.title = '点击添加';
      }
    }
  }
  function startEditSongTitle() {
    const el = document.getElementById('song-title-display');
    const input = document.createElement('input');
    input.type = 'text'; input.className = 'song-title-input';
    input.value = songTitle; input.placeholder = '输入歌名...'; input.maxLength = 60;
    el.replaceWith(input); input.focus(); input.select();
    const finish = () => {
      songTitle = input.value.trim();
      const newEl = document.createElement('span');
      newEl.id = 'song-title-display'; newEl.className = 'song-title-display';
      newEl.onclick = startEditSongTitle; input.replaceWith(newEl);
      renderSongTitleDisplay();
    };
    input.addEventListener('blur', finish);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
      if (e.key === 'Escape') { input.value = songTitle; input.blur(); }
    });
  }

  // ─── Speech ───────────────────────────────────────────
  function setupSpeechRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return;
    recognition = new SR();
    recognition.continuous = true; recognition.interimResults = true; recognition.lang = 'zh-CN';
    recognition.onresult = (e) => {
      let finalText = '', interimText = '';
      for (let i = 0; i < e.results.length; i++) {
        if (e.results[i].isFinal) finalText += e.results[i][0].transcript;
        else interimText += e.results[i][0].transcript;
      }
      const ta = document.getElementById('note-textarea');
      const sep = noteBaseText && !noteBaseText.endsWith(' ') && !noteBaseText.endsWith('\n') && finalText ? ' ' : '';
      ta.value = noteBaseText + sep + finalText + interimText;
      updateConfirmBtn();
    };
    recognition.onerror = (e) => {
      if (e.error === 'no-speech') return;
      if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
        isNoteRecording = false; setNoteStatus('no-permission');
        document.getElementById('note-mic-toggle').classList.remove('recording');
        document.getElementById('note-mic-label').textContent = '录音'; return;
      }
      stopNoteRecording();
    };
    recognition.onend = () => { if (isNoteRecording) { try { recognition.start(); } catch(err){} } };
  }

  // ─── Palette ──────────────────────────────────────────
  function loadPalette() {
    try { const r = localStorage.getItem('lyricnote_palette'); if (r) { const a = JSON.parse(r); if (Array.isArray(a) && a.length) return a; } } catch(e) {}
    return [...DEFAULT_PALETTE];
  }
  function savePalette() { try { localStorage.setItem('lyricnote_palette', JSON.stringify(palette)); } catch(e){} }

  function renderPalette() {
    const container = document.getElementById('palette');
    container.innerHTML = '';
    container.classList.toggle('edit-mode', paletteEditMode);
    const editBtn = document.getElementById('palette-edit-btn');
    if (editBtn) editBtn.classList.toggle('active', paletteEditMode);

    palette.forEach((color, idx) => {
      const sw = document.createElement('div');
      sw.className = 'color-swatch'; sw.style.background = color;
      sw.title = paletteEditMode ? '拖动排序 · 点 × 删除' : color;
      sw.dataset.idx = idx; sw.draggable = paletteEditMode;
      sw.addEventListener('click', () => { if (!paletteEditMode) addColorMark(color); });
      sw.addEventListener('dragstart', (e) => { if (!paletteEditMode){e.preventDefault();return;} sw.classList.add('dragging'); e.dataTransfer.setData('text/plain',String(idx)); });
      sw.addEventListener('dragend', () => sw.classList.remove('dragging'));
      sw.addEventListener('dragover', (e) => { if (!paletteEditMode) return; e.preventDefault(); sw.classList.add('drag-over'); });
      sw.addEventListener('dragleave', () => sw.classList.remove('drag-over'));
      sw.addEventListener('drop', (e) => {
        if (!paletteEditMode) return; e.preventDefault(); sw.classList.remove('drag-over');
        const from = parseInt(e.dataTransfer.getData('text/plain'),10);
        const to = parseInt(sw.dataset.idx,10);
        if (isNaN(from)||isNaN(to)||from===to) return;
        const moved = palette.splice(from,1)[0]; palette.splice(to,0,moved);
        savePalette(); renderPalette(); if (selRange) showToolbarAtSelection();
      });
      const del = document.createElement('div');
      del.className = 'swatch-del'; del.textContent = '×'; del.title = '删除此颜色';
      del.addEventListener('click', (e) => { e.stopPropagation(); palette.splice(idx,1); savePalette(); renderPalette(); if (selRange) showToolbarAtSelection(); });
      del.addEventListener('mousedown', (e) => e.stopPropagation());
      sw.appendChild(del); container.appendChild(sw);
    });
  }
  function togglePaletteEditMode() { paletteEditMode = !paletteEditMode; renderPalette(); if (selRange) showToolbarAtSelection(); }

  function setupCustomColorPicker() {
    const input = document.getElementById('custom-color');
    const trigger = document.getElementById('custom-color-trigger');
    const wrap = document.getElementById('custom-wrap');
    input.addEventListener('input', (e) => {
      pendingCustomColor = e.target.value;
      trigger.style.background = pendingCustomColor;
      trigger.classList.add('has-color');
      wrap.classList.add('active');
    });
  }
  function confirmCustomColor() {
    if (!pendingCustomColor) return;
    if (!palette.includes(pendingCustomColor)) { palette.push(pendingCustomColor); savePalette(); }
    const trigger = document.getElementById('custom-color-trigger');
    const wrap = document.getElementById('custom-wrap');
    trigger.style.background = ''; trigger.classList.remove('has-color'); wrap.classList.remove('active');
    pendingCustomColor = null; renderPalette(); if (selRange) showToolbarAtSelection();
  }

  // ─── Section mode ─────────────────────────────────────
  function buildSectionPicker() {
    const container = document.getElementById('section-picker-options');
    container.innerHTML = '';
    SECTION_TAGS.forEach(tag => {
      const opt = document.createElement('div');
      opt.className = 'sp-opt';
      opt.innerHTML = `<span class="sp-dot" style="background:${tag.color}"></span>${tag.label}`;
      opt.addEventListener('click', () => selectSectionTag(tag.id));
      container.appendChild(opt);
    });
    const sep = document.createElement('div'); sep.className = 'sp-sep'; container.appendChild(sep);
    const rem = document.createElement('div'); rem.className = 'sp-remove'; rem.textContent = '删除段落标记';
    rem.addEventListener('click', removeSectionTag); container.appendChild(rem);
  }

  function toggleSectionMode() {
    sectionMode = !sectionMode;
    const btn = document.getElementById('section-btn');
    btn.classList.toggle('active', sectionMode);
    renderLyrics();
  }

  function openSectionPicker(lineIdx, anchorEl) {
    activeSectionLine = lineIdx;
    const picker = document.getElementById('section-picker');
    picker.classList.add('visible');
    const rect = anchorEl.getBoundingClientRect();
    let left = rect.left;
    let top  = rect.bottom + 6;
    const pw = 170;
    if (left + pw > window.innerWidth - 12) left = window.innerWidth - pw - 12;
    if (left < 8) left = 8;
    if (top + 240 > window.innerHeight - 8) top = rect.top - 240;
    picker.style.left = left + 'px';
    picker.style.top  = top  + 'px';
  }
  function closeSectionPicker() {
    document.getElementById('section-picker').classList.remove('visible');
    activeSectionLine = null;
  }
  function selectSectionTag(tagId) {
    sections = sections.filter(s => s.lineIndex !== activeSectionLine);
    sections.push({ id: uid(), lineIndex: activeSectionLine, tag: tagId });
    closeSectionPicker(); renderLyrics();
  }
  function removeSectionTag() {
    sections = sections.filter(s => s.lineIndex !== activeSectionLine);
    closeSectionPicker(); renderLyrics();
  }

  // ─── Lyrics Render ────────────────────────────────────
  function getCharColorAnn(absIdx) {
    const covering = annotations.filter(a => a.type==='color' && absIdx>=a.charIndex && absIdx<a.charIndex+(a.length||1));
    return covering.length > 0 ? covering[covering.length-1] : null;
  }
  function getCharNoteAnn(absIdx) {
    return annotations.find(a => a.type==='note' && absIdx>=a.charIndex && absIdx<a.charIndex+(a.length||1)) || null;
  }
  function getCharUlAnn(absIdx) {
    const covering = annotations.filter(a => a.type==='underline' && absIdx>=a.charIndex && absIdx<a.charIndex+(a.length||1));
    return covering.length > 0 ? covering[covering.length-1] : null;
  }

  function renderLyrics() {
    const container = document.getElementById('lyric-container');
    container.innerHTML = '';
    container.classList.toggle('section-mode', sectionMode);

    if (!lyrics) {
      const em = document.createElement('div');
      em.className = 'empty-state';
      em.innerHTML = `<div class="empty-icon">🎵</div><div class="empty-title">还没有歌词</div><div class="empty-hint">点击右上角「导入」粘贴歌词，开始标注练唱。</div>`;
      container.appendChild(em); return;
    }

    const lines = lyrics.split('\n');
    let gi = 0;

    lines.forEach((line, lineIdx) => {
      const block = document.createElement('div');
      block.className = 'lyric-block';

      // Section label
      const sec = sections.find(s => s.lineIndex === lineIdx);
      if (sec) {
        const tag = SECTION_TAGS.find(t => t.id === sec.tag);
        if (tag) {
          const lrow = document.createElement('div');
          lrow.className = 'section-label-row';
          const lbl = document.createElement('div');
          lbl.className = `section-label ${tag.cls}`;
          if (sectionMode) { lbl.classList.add('clickable'); lbl.title = '修改/删除'; }
          lbl.innerHTML = `<span class="sl-dot"></span>${tag.label}`;
          if (sectionMode) lbl.addEventListener('click', (e) => { e.stopPropagation(); openSectionPicker(lineIdx, lbl); });
          lrow.appendChild(lbl);
          block.appendChild(lrow);
        }
      }

      const outer = document.createElement('div');
      outer.className = 'lyric-line-outer';

      // Section trigger button
      const trigger = document.createElement('div');
      trigger.className = 'section-trigger';
      const trigBtn = document.createElement('div');
      trigBtn.className = 'section-trigger-btn' + (sec ? ' has-sec' : '');
      trigBtn.textContent = sec ? '✎' : '+';
      trigBtn.title = sec ? '修改段落' : '添加段落';
      trigBtn.addEventListener('click', (e) => { e.stopPropagation(); openSectionPicker(lineIdx, trigBtn); });
      trigger.appendChild(trigBtn);
      outer.appendChild(trigger);

      const lineDiv = document.createElement('div');
      lineDiv.className = 'lyric-line';

      const chars = Array.from(line);
      chars.forEach((ch, ci) => {
        const absIdx = gi + ci;
        const wrap = document.createElement('div');
        wrap.className = 'char-wrap';
        const span = document.createElement('span');
        span.className = 'lyric-char';
        span.dataset.idx = absIdx;
        span.textContent = ch;

        // Color
        const myAnn = getCharColorAnn(absIdx);
        if (myAnn) {
          span.classList.add('mark');
          span.style.setProperty('--mark-color', myAnn.color);
          const prevA = ci>0 ? getCharColorAnn(absIdx-1) : null;
          const nextA = ci<chars.length-1 ? getCharColorAnn(absIdx+1) : null;
          if (!prevA||prevA.id!==myAnn.id) span.classList.add('mark-start');
          if (!nextA||nextA.id!==myAnn.id) span.classList.add('mark-end');
        }

        // Note underline
        const noteAnn = getCharNoteAnn(absIdx);
        if (noteAnn) {
          span.classList.add('has-note');
          const pn = ci>0 ? getCharNoteAnn(absIdx-1) : null;
          const nn = ci<chars.length-1 ? getCharNoteAnn(absIdx+1) : null;
          const iS = !pn||pn.id!==noteAnn.id, iE = !nn||nn.id!==noteAnn.id;
          if (iS&&iE) span.classList.add('has-note-single');
          else if (iS) span.classList.add('has-note-start');
          else if (iE) span.classList.add('has-note-end');
          else span.classList.add('has-note-inner');
        }

        // Underline/symbol mark
        const ulAnn = getCharUlAnn(absIdx);
        if (ulAnn) span.classList.add('ul-' + ulAnn.style);

        // Selection highlight
        if (selRange && absIdx >= Math.min(selRange.start,selRange.end) && absIdx <= Math.max(selRange.start,selRange.end)) span.classList.add('sel');

        span.addEventListener('mousedown', (e) => { e.preventDefault(); startSel(absIdx); });
        span.addEventListener('mousemove', () => { if (isSelecting) extSel(absIdx); });
        span.addEventListener('touchstart', (e) => { e.preventDefault(); startSel(absIdx); }, {passive:false});

        wrap.appendChild(span);

        // Color del ×
        if (myAnn) {
          const nextA2 = ci<chars.length-1 ? getCharColorAnn(absIdx+1) : null;
          if (!nextA2||nextA2.id!==myAnn.id) {
            const delX = document.createElement('div');
            delX.className = 'del-x active'; delX.textContent = '×'; delX.title = '删除色块';
            delX.addEventListener('mousedown', (e) => { e.stopPropagation(); e.preventDefault(); });
            delX.addEventListener('touchstart', (e) => { e.stopPropagation(); e.preventDefault(); deleteAnnotation(myAnn.id); }, {passive:false});
            delX.addEventListener('click', (e) => { e.stopPropagation(); deleteAnnotation(myAnn.id); });
            wrap.appendChild(delX);
          }
        }

        // Note tag
        if (noteAnn) {
          const nxt = ci<chars.length-1 ? getCharNoteAnn(absIdx+1) : null;
          if (!nxt||nxt.id!==noteAnn.id) {
            const tag = document.createElement('span');
            tag.className = 'note-tag'; tag.textContent = noteAnn.content;
            tag.addEventListener('click', (e) => { e.stopPropagation(); showPopover(e, noteAnn); });
            tag.addEventListener('mousedown', (e) => e.stopPropagation());
            tag.addEventListener('touchstart', (e) => { e.stopPropagation(); e.preventDefault(); showPopover(e, noteAnn); }, {passive:false});
            wrap.appendChild(tag);
          }
        }

        // Underline del × (on last char of group)
        if (ulAnn) {
          const nxtUl = ci<chars.length-1 ? getCharUlAnn(absIdx+1) : null;
          if (!nxtUl||nxtUl.id!==ulAnn.id) {
            const delX = document.createElement('div');
            delX.className = 'del-x active'; delX.textContent = '×'; delX.title = '删除记号';
            delX.style.background = '#475569';
            delX.addEventListener('mousedown', (e) => { e.stopPropagation(); e.preventDefault(); });
            delX.addEventListener('touchstart', (e) => { e.stopPropagation(); e.preventDefault(); deleteAnnotation(ulAnn.id); }, {passive:false});
            delX.addEventListener('click', (e) => { e.stopPropagation(); deleteAnnotation(ulAnn.id); });
            wrap.appendChild(delX);
          }
        }

        lineDiv.appendChild(wrap);
      });

      gi += line.length + 1;
      outer.appendChild(lineDiv);
      block.appendChild(outer);
      container.appendChild(block);
    });
  }

  // ─── Selection ────────────────────────────────────────
  function updateSelectionClasses() {
    const all = document.querySelectorAll('#lyric-container .lyric-char');
    if (!selRange) { all.forEach(el => el.classList.remove('sel')); return; }
    const lo = Math.min(selRange.start,selRange.end), hi = Math.max(selRange.start,selRange.end);
    all.forEach(el => {
      const idx = parseInt(el.dataset.idx,10);
      if (idx>=lo && idx<=hi) el.classList.add('sel'); else el.classList.remove('sel');
    });
  }
  function startSel(idx) { isSelecting=true; selRange={start:idx,end:idx}; hideToolbar(); updateSelectionClasses(); }
  function extSel(idx)  { if (!isSelecting) return; if (selRange&&selRange.end===idx) return; selRange={...selRange,end:idx}; updateSelectionClasses(); }
  function endSel()     { if (isSelecting&&selRange) { isSelecting=false; showToolbarAtSelection(); } else isSelecting=false; }
  function clearSelection() { selRange=null; hideToolbar(); updateSelectionClasses(); }

  document.addEventListener('mouseup', endSel);
  document.addEventListener('touchend', endSel);
  document.addEventListener('touchcancel', endSel);
  document.addEventListener('touchmove', (e) => {
    if (!isSelecting) return;
    const t = e.touches[0]; if (!t) return;
    const el = document.elementFromPoint(t.clientX, t.clientY); if (!el) return;
    const charEl = el.closest('.lyric-char');
    if (charEl && charEl.dataset.idx !== undefined) { e.preventDefault(); extSel(parseInt(charEl.dataset.idx,10)); }
  }, {passive:false});

  document.addEventListener('mousedown', (e) => {
    if (paletteEditMode && !e.target.closest('#palette,#palette-edit-btn')) { paletteEditMode=false; renderPalette(); if (selRange) showToolbarAtSelection(); }
    const inI = e.target.closest('.lyric-char,.note-tag,#float-toolbar,#note-editor,#popover-box,.modal,.preview-modal,.btn,.del-x,.song-title-display,.song-title-input,.section-trigger-btn,.section-label');
    if (!inI && selRange) clearSelection();
  });
  document.addEventListener('touchstart', (e) => {
    const inI = e.target.closest('.lyric-char,.note-tag,#float-toolbar,#note-editor,#popover-box,.modal,.preview-modal,.btn,.del-x,.song-title-display,.song-title-input,.swatch-del,.color-swatch,.section-trigger-btn,.section-label');
    if (!inI) { if (paletteEditMode){paletteEditMode=false;renderPalette();} if (selRange) clearSelection(); }
  }, {passive:true});

  // ─── Positioning ──────────────────────────────────────
  function getSelectionBounds() {
    if (!selRange) return null;
    const lo=Math.min(selRange.start,selRange.end), hi=Math.max(selRange.start,selRange.end);
    const sEl=document.querySelector(`.lyric-char[data-idx="${lo}"]`);
    const eEl=document.querySelector(`.lyric-char[data-idx="${hi}"]`);
    if (!sEl||!eEl) return null;
    const sR=sEl.getBoundingClientRect(), eR=eEl.getBoundingClientRect();
    return {
      left:Math.min(sR.left,eR.left), right:Math.max(sR.right,eR.right),
      top:Math.min(sR.top,eR.top), bottom:Math.max(sR.bottom,eR.bottom),
      centerX:(Math.min(sR.left,eR.left)+Math.max(sR.right,eR.right))/2
    };
  }
  function positionFloat(el, flippedClass='flipped') {
    const bounds=getSelectionBounds(); if (!bounds) return;
    requestAnimationFrame(() => {
      const r=el.getBoundingClientRect(), w=r.width, h=r.height, gap=14, margin=10;
      let left=bounds.centerX-w/2, top=bounds.bottom+gap, flipped=false;
      if (top+h>window.innerHeight-margin) { top=bounds.top-h-gap; flipped=true; }
      if (top<margin) { top=Math.max(margin,bounds.bottom+gap); flipped=false; }
      if (left<margin) left=margin;
      if (left+w>window.innerWidth-margin) left=window.innerWidth-w-margin;
      const arrowX=Math.max(16,Math.min(w-16,bounds.centerX-left));
      el.style.setProperty('--arrow-x', arrowX+'px');
      if (flipped) el.classList.add(flippedClass); else el.classList.remove(flippedClass);
      el.style.left=(left+window.scrollX)+'px';
      el.style.top=(top+window.scrollY)+'px';
    });
  }
  function showToolbarAtSelection() { const tb=document.getElementById('float-toolbar'); tb.classList.add('visible'); positionFloat(tb); }
  function hideToolbar() {
    document.getElementById('float-toolbar').classList.remove('visible');
    const wrap=document.getElementById('custom-wrap'), trigger=document.getElementById('custom-color-trigger');
    if (wrap) wrap.classList.remove('active');
    if (trigger) { trigger.style.background=''; trigger.classList.remove('has-color'); }
    pendingCustomColor=null;
  }

  // ─── Annotations ──────────────────────────────────────
  function addColorMark(color) {
    if (!selRange) return;
    const start=Math.min(selRange.start,selRange.end), len=Math.abs(selRange.end-selRange.start)+1;
    annotations.push({id:uid(), charIndex:start, length:len, type:'color', color});
    clearSelection(); renderLyrics();
  }
  function addUnderlineMark(style) {
    if (!selRange) return;
    const start=Math.min(selRange.start,selRange.end), len=Math.abs(selRange.end-selRange.start)+1;
    // Remove existing underline on same range
    annotations = annotations.filter(a => !(a.type==='underline' && rangesOverlap(a,start,len)));
    annotations.push({id:uid(), charIndex:start, length:len, type:'underline', style});
    clearSelection(); renderLyrics();
  }
  function clearUnderlineMarks() {
    if (!selRange) return;
    const start=Math.min(selRange.start,selRange.end), len=Math.abs(selRange.end-selRange.start)+1;
    annotations = annotations.filter(a => !(a.type==='underline' && rangesOverlap(a,start,len)));
    clearSelection(); renderLyrics();
  }
  function rangesOverlap(ann, start, len) {
    return ann.charIndex < start+len && ann.charIndex+(ann.length||1) > start;
  }
  function deleteAnnotation(id) { annotations=annotations.filter(a=>a.id!==id); renderLyrics(); }

  // ─── Note Editor ──────────────────────────────────────
  function openNoteEditor() {
    if (!selRange) return;
    editingNoteId=null;
    const editor=document.getElementById('note-editor'), ta=document.getElementById('note-textarea');
    ta.value=''; noteBaseText=''; updateConfirmBtn(); setNoteStatus('ready');
    hideToolbar(); editor.classList.add('visible'); positionFloat(editor);
    setTimeout(() => { startNoteRecording(); }, 80);
  }
  function setNoteStatus(state) {
    const text=document.getElementById('note-status-text'), wave=document.getElementById('rec-wave');
    text.classList.remove('recording'); wave.classList.remove('active');
    if (state==='recording'){text.textContent='正在聆听...';text.classList.add('recording');wave.classList.add('active');}
    else if (state==='ready'){text.textContent='准备中...';}
    else if (state==='idle'){text.textContent='已停止 · 可编辑';}
    else if (state==='unsupported'){text.textContent='浏览器不支持语音，请手动输入';}
    else if (state==='no-permission'){text.textContent='⚠ 麦克风权限被拒绝';}
  }
  async function startNoteRecording() {
    if (!recognition){setNoteStatus('unsupported');return;}
    if (isNoteRecording) return;
    if (!window.isSecureContext){setNoteStatus('no-permission');return;}
    try { const stream=await navigator.mediaDevices.getUserMedia({audio:true}); stream.getTracks().forEach(t=>t.stop()); } catch(err){setNoteStatus('no-permission');return;}
    noteBaseText=document.getElementById('note-textarea').value;
    isNoteRecording=true;
    document.getElementById('note-mic-toggle').classList.add('recording');
    document.getElementById('note-mic-label').textContent='停止';
    setNoteStatus('recording');
    try { recognition.start(); } catch(e){}
  }
  function stopNoteRecording() {
    isNoteRecording=false;
    if (recognition){try{recognition.stop();}catch(e){}}
    document.getElementById('note-mic-toggle').classList.remove('recording');
    document.getElementById('note-mic-label').textContent='录音';
    setNoteStatus('idle');
  }
  function toggleNoteRecording() { if (isNoteRecording) stopNoteRecording(); else startNoteRecording(); }
  function updateConfirmBtn() { document.getElementById('note-confirm-btn').disabled=!document.getElementById('note-textarea').value.trim(); }
  document.addEventListener('input', (e) => { if (e.target.id==='note-textarea'){if(isNoteRecording)noteBaseText=e.target.value;updateConfirmBtn();} });
  function cancelNoteEditor() { stopNoteRecording(); document.getElementById('note-editor').classList.remove('visible'); editingNoteId=null; clearSelection(); }
  function confirmNote() {
    const content=document.getElementById('note-textarea').value.trim(); if (!content) return;
    stopNoteRecording();
    if (editingNoteId) { const ann=annotations.find(a=>a.id===editingNoteId); if(ann) ann.content=content; editingNoteId=null; }
    else if (selRange) {
      const start=Math.min(selRange.start,selRange.end), len=Math.abs(selRange.end-selRange.start)+1;
      annotations.push({id:uid(), charIndex:start, length:len, type:'note', content});
    }
    document.getElementById('note-editor').classList.remove('visible');
    clearSelection(); renderLyrics();
  }

  // ─── Popover ──────────────────────────────────────────
  function showPopover(e, ann) {
    activeNoteId=ann.id;
    const box=document.getElementById('popover-box'), overlay=document.getElementById('popover-overlay');
    document.getElementById('popover-text').textContent=ann.content;
    let anchor=(e.currentTarget&&e.currentTarget.getBoundingClientRect)?e.currentTarget:(e.target&&e.target.closest?e.target.closest('.note-tag'):null);
    let rect;
    if (anchor) rect=anchor.getBoundingClientRect();
    else if (e.touches&&e.touches[0]){const t=e.touches[0];rect={left:t.clientX,right:t.clientX,top:t.clientY,bottom:t.clientY};}
    else rect={left:100,right:100,top:100,bottom:100};
    box.style.display='block'; overlay.classList.add('active');
    requestAnimationFrame(() => {
      const bw=box.offsetWidth;
      let left=rect.left+window.scrollX;
      if (left+bw>window.innerWidth-12) left=window.innerWidth-bw-12;
      if (left<12) left=12;
      box.style.left=left+'px'; box.style.top=(rect.bottom+window.scrollY+8)+'px';
    });
  }
  function closePopover() { document.getElementById('popover-box').style.display='none'; document.getElementById('popover-overlay').classList.remove('active'); activeNoteId=null; }
  function deleteNote() { if(activeNoteId){annotations=annotations.filter(a=>a.id!==activeNoteId);closePopover();renderLyrics();} }
  function editExistingNote() {
    if (!activeNoteId) return;
    const ann=annotations.find(a=>a.id===activeNoteId); if (!ann) return;
    editingNoteId=activeNoteId;
    selRange={start:ann.charIndex,end:ann.charIndex+(ann.length||1)-1};
    renderLyrics(); closePopover();
    const editor=document.getElementById('note-editor'), ta=document.getElementById('note-textarea');
    ta.value=ann.content; noteBaseText=ann.content; updateConfirmBtn(); setNoteStatus('idle');
    editor.classList.add('visible'); positionFloat(editor);
    setTimeout(()=>ta.focus(),50);
  }

  // ─── Import / Edit Modal ─────────────────────────────
  function openModal(editMode) {
    isEditMode = !!editMode;
    document.getElementById('modal').classList.add('active');
    document.getElementById('song-title-input').value = songTitle;

    if (isEditMode && lyrics) {
      document.getElementById('modal-title').textContent = '编辑歌词';
      const annCount = annotations.length + sections.length;
      const desc = document.getElementById('modal-desc');
      if (annCount > 0) {
        desc.textContent = `注意：修改后确认将清除现有 ${annCount} 处标注及段落。`;
        desc.className = 'modal-desc warn';
      } else {
        desc.textContent = '直接修改歌词内容，确认后重新生成。';
        desc.className = 'modal-desc';
      }
      document.getElementById('lyrics-input').value = lyrics;
      document.getElementById('split-hint').textContent = '编辑模式：仅按换行符分行，不自动分句。';
      document.getElementById('import-confirm-btn').textContent = '确认修改';
    } else {
      document.getElementById('modal-title').textContent = '导入新歌词';
      document.getElementById('modal-desc').textContent = '粘贴歌词进行新标注，现有标注会清除。';
      document.getElementById('modal-desc').className = 'modal-desc';
      document.getElementById('lyrics-input').value = '';
      document.getElementById('split-hint').textContent = '自动分行：按换行符 & 中英文标点（，。！？；：、…）拆成一句一行。';
      document.getElementById('import-confirm-btn').textContent = '确认';
    }
    setTimeout(() => document.getElementById('lyrics-input').focus(), 50);
  }
  function closeModal() { document.getElementById('modal').classList.remove('active'); document.getElementById('lyrics-input').value=''; }
  function closeModalIfOut(e) { if(e.target.id==='modal') closeModal(); }

  function autoSplitLyrics(raw) {
    if (!raw) return '';
    const parts=raw.split(/[\n\r,.;:!?，。！？；：、…—\-]+/g)
      .map(s=>s.trim())
      .map(s=>s.replace(/^[\s\u3000"'""''`()（）【】\[\]《》「」『』<>]+/,''))
      .map(s=>s.replace(/[\s\u3000"'""''`()（）【】\[\]《》「」『』<>]+$/,''))
      .filter(s=>s.length>0);
    return parts.join('\n');
  }

  function importLyrics() {
    const rawTitle=document.getElementById('song-title-input').value.trim();
    const raw=document.getElementById('lyrics-input').value;
    let processed;
    if (isEditMode) {
      processed = raw.split(/[\n\r]+/).map(s=>s.trim()).filter(s=>s.length>0).join('\n');
    } else {
      processed = autoSplitLyrics(raw);
    }
    if (!processed) return;
    songTitle=rawTitle; lyrics=processed;
    annotations=[]; sections=[]; selRange=null;
    hideToolbar(); closeModal(); renderLyrics(); renderSongTitleDisplay();
    document.getElementById('edit-lyrics-btn').style.display='';
    afterLyricsUpdate();
  }

  // ─── Export Preview ────────────────────────────────────
  function showPreview(format) {
    exportFormat=format; buildExportSheet();
    document.getElementById('preview-title').textContent=format==='pdf'?'导出 PDF 预览':'导出图片预览';
    document.getElementById('preview-subtitle').textContent=format==='pdf'?'将按 A4 自动分页':'完整长图导出';
    document.getElementById('preview-confirm-btn').textContent=format==='pdf'?'下载 PDF':'下载图片';
    document.getElementById('preview-modal-bg').classList.add('active');
  }
  function closePreview() { document.getElementById('preview-modal-bg').classList.remove('active'); }
  function closePreviewIfOut(e) { if(e.target.id==='preview-modal-bg') closePreview(); }

  function buildExportSheet() {
    const sheet=document.getElementById('export-sheet');
    sheet.className=`export-sheet ${exportFormat==='pdf'?'export-pdf':'export-image'}`;
    const today=new Date();
    const dateStr=`${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')}`;
    const titleHTML=songTitle?`<div class="export-title">${escapeHtml(songTitle)}</div>`:'<div class="export-title">未命名歌词</div>';
    const footerText=exportFormat==='pdf'?'LyricNote Archive':'LyricNote Poster';
    const notesRaw = (document.getElementById('notes-textarea').value||'').trim();
    const notesHTML = notesRaw ? `
      <div class="export-notes-section">
        <div class="export-notes-heading">练唱笔记</div>
        <div class="export-notes-body">${renderNotesAsExportHTML(notesRaw)}</div>
      </div>` : '';
    sheet.innerHTML=`
      <div class="export-header">
        <div class="export-brand">LyricNote</div>
        ${titleHTML}
        <div class="export-date">${dateStr}</div>
      </div>
      <div class="export-lyrics" id="export-lyrics-body"></div>
      ${notesHTML}
      <div class="export-footer">${footerText}</div>
    `;
    renderLyricsInto(document.getElementById('export-lyrics-body'), true);
  }

  function escapeHtml(s) { return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function renderLyricsInto(container, forExport=false) {
    container.innerHTML='';
    const lines=lyrics.split('\n');
    let gi=0;
    lines.forEach((line, lineIdx) => {
      // Section label in export
      if (forExport) {
        const sec=sections.find(s=>s.lineIndex===lineIdx);
        if (sec) {
          const tag=SECTION_TAGS.find(t=>t.id===sec.tag);
          if (tag) {
            const lbl=document.createElement('div');
            lbl.className='export-section-label';
            lbl.textContent=`— ${tag.label} —`;
            container.appendChild(lbl);
          }
        }
      }

      const lineDiv=document.createElement('div');
      lineDiv.className='lyric-line';
      const chars=Array.from(line);
      chars.forEach((ch,ci) => {
        const absIdx=gi+ci;
        const wrap=document.createElement('div'); wrap.className='char-wrap';
        const span=document.createElement('span'); span.className='lyric-char'; span.textContent=ch;
        const myAnn=getCharColorAnn(absIdx);
        if (myAnn) {
          span.classList.add('mark'); span.style.setProperty('--mark-color',myAnn.color);
          const pA=ci>0?getCharColorAnn(absIdx-1):null, nA=ci<chars.length-1?getCharColorAnn(absIdx+1):null;
          if (!pA||pA.id!==myAnn.id) span.classList.add('mark-start');
          if (!nA||nA.id!==myAnn.id) span.classList.add('mark-end');
        }
        const noteAnn=getCharNoteAnn(absIdx);
        if (noteAnn) {
          span.classList.add('has-note');
          const pn=ci>0?getCharNoteAnn(absIdx-1):null, nn=ci<chars.length-1?getCharNoteAnn(absIdx+1):null;
          const iS=!pn||pn.id!==noteAnn.id, iE=!nn||nn.id!==noteAnn.id;
          if (iS&&iE) span.classList.add('has-note-single');
          else if (iS) span.classList.add('has-note-start');
          else if (iE) span.classList.add('has-note-end');
          else span.classList.add('has-note-inner');
        }
        const ulAnn=getCharUlAnn(absIdx);
        if (ulAnn) span.classList.add('ul-'+ulAnn.style);
        wrap.appendChild(span);
        if (noteAnn) {
          const nn2=ci<chars.length-1?getCharNoteAnn(absIdx+1):null;
          if (!nn2||nn2.id!==noteAnn.id) {
            const tag=document.createElement('span'); tag.className='note-tag'; tag.textContent=noteAnn.content;
            wrap.appendChild(tag);
          }
        }
        lineDiv.appendChild(wrap);
      });
      gi+=line.length+1;
      container.appendChild(lineDiv);
      // Per-line note in export
      if (forExport) {
        const ln = lineNotes.find(n => n.lineIndex === lineIdx);
        if (ln && ln.text.trim()) {
          const noteDiv = document.createElement('div');
          noteDiv.className = 'export-line-note';
          noteDiv.textContent = ln.text.trim();
          container.appendChild(noteDiv);
        }
      }
    });
  }

  function getCanvasOptions(element, scale=2) {
    const rect=element.getBoundingClientRect();
    return {
      scale, useCORS:true,
      backgroundColor: getComputedStyle(element).backgroundColor||'#FFFFFF',
      width:Math.ceil(rect.width), height:Math.ceil(element.scrollHeight),
      windowWidth:Math.ceil(rect.width), windowHeight:Math.ceil(element.scrollHeight),
      scrollX:0, scrollY:-window.scrollY
    };
  }

  function buildPdfPages() {
    const sheet=document.getElementById('export-sheet');
    const lyricBody=document.getElementById('export-lyrics-body');
    const notesSection=sheet.querySelector('.export-notes-section');
    const lineEls=lyricBody?Array.from(lyricBody.querySelectorAll('.lyric-line,.export-section-label,.export-line-note')):[];
    if (!lineEls.length) { const only=sheet.cloneNode(true); ['position','opacity','left','top','visibility'].forEach(p=>only.style[p]=''); return [only]; }
    const header=sheet.querySelector('.export-header'), footer=sheet.querySelector('.export-footer');
    const notesSectionHTML=notesSection?notesSection.outerHTML:'';
    const sheetStyle=getComputedStyle(sheet);
    const pageHeight=842;
    const usableH=pageHeight-parseFloat(sheetStyle.paddingTop)-parseFloat(sheetStyle.paddingBottom)-header.offsetHeight-footer.offsetHeight-40;
    const offscreen=(el)=>{el.style.cssText='position:fixed;left:-99999px;top:0;opacity:1;pointer-events:none;z-index:-1;';}
    const clearStage=(el)=>{['position','left','top','opacity','pointerEvents','zIndex','visibility'].forEach(p=>el.style[p]='');}
    const createShell=(includeNotes=false)=>{
      const p=sheet.cloneNode(false); p.className=sheet.className;
      p.innerHTML=`<div class="export-header">${header.innerHTML}</div><div class="export-lyrics"></div>${includeNotes?notesSectionHTML:''}<div class="export-footer">${footer.innerHTML}</div>`;
      return p;
    };
    const pages=[]; let cur=createShell(); offscreen(cur); document.body.appendChild(cur); let curL=cur.querySelector('.export-lyrics');
    const snap=(isLast=false)=>{
      // On last page: rebuild with notes section included so it flows naturally
      if (isLast && notesSectionHTML) {
        cur.remove();
        cur=createShell(true); offscreen(cur); document.body.appendChild(cur);
        curL=cur.querySelector('.export-lyrics');
        // re-append all children of the page's lyrics that we already built
        Array.from(pages.length>0?[]:[] ).forEach(c=>curL.appendChild(c)); // placeholder — handled below
      }
      const s=cur.cloneNode(true); clearStage(s); pages.push(s);
    };
    lineEls.forEach((line, idx)=>{
      curL.appendChild(line.cloneNode(true));
      const isLast = idx === lineEls.length - 1;
      if (!isLast && curL.scrollHeight>usableH && curL.children.length>1) {
        curL.removeChild(curL.lastChild); snap(); cur.remove();
        cur=createShell(); offscreen(cur); document.body.appendChild(cur); curL=cur.querySelector('.export-lyrics');
        curL.appendChild(line.cloneNode(true));
      }
    });
    // Final page: inject notes section into the cloned shell
    if (notesSectionHTML) {
      const lastFooter = cur.querySelector('.export-footer');
      const noteEl = document.createElement('div');
      noteEl.innerHTML = notesSectionHTML;
      cur.insertBefore(noteEl.firstElementChild, lastFooter);
    }
    const finalSnap = cur.cloneNode(true); clearStage(finalSnap); pages.push(finalSnap);
    cur.remove(); return pages;
  }

  async function confirmExport() {
    const sheet=document.getElementById('export-sheet'), btn=document.getElementById('preview-confirm-btn');
    btn.disabled=true; btn.textContent='生成中...';
    try {
      const d=new Date(), dstr=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
      const safeTitle=(songTitle||'lyrics').replace(/[\/:*?"<>|]/g,'_').slice(0,40);
      if (exportFormat==='pdf') {
        const {jsPDF}=window.jspdf, pdf=new jsPDF('p','mm','a4');
        const pW=pdf.internal.pageSize.getWidth(), pH=pdf.internal.pageSize.getHeight();
        const pages=buildPdfPages();
        for (let i=0;i<pages.length;i++) {
          const page=pages[i];
          page.style.cssText='position:fixed;left:-99999px;top:0;opacity:1;pointer-events:none;z-index:-1;';
          document.body.appendChild(page);
          await new Promise(r=>requestAnimationFrame(r));
          const pc=await html2canvas(page,getCanvasOptions(page,2.5));
          const rH=(pc.height*pW)/pc.width;
          if (i>0) pdf.addPage();
          pdf.addImage(pc.toDataURL('image/png'),'PNG',0,0,pW,Math.min(pH,rH));
          page.remove();
        }
        pdf.save(`LyricNote_${safeTitle}_${dstr}.pdf`);
      } else {
        const canvas=await html2canvas(sheet,getCanvasOptions(sheet,3));
        const link=document.createElement('a');
        link.download=`LyricNote_${safeTitle}_${dstr}.png`;
        link.href=canvas.toDataURL('image/png'); link.click();
      }
    } catch(err) { console.error(err); alert('导出失败，请重试'); }
    btn.disabled=false;
    btn.textContent=exportFormat==='pdf'?'下载 PDF':'下载图片';
    closePreview();
  }

  function uid() { return Math.random().toString(36).slice(2,9); }

  // ─── Notes: state ─────────────────────────────────────
  let notesSaveTimer = null;
  let notesVisible = false;
  let lineNotes = [];       // {id, lineIndex, text}
  let marginW = 210;
  let bottomNotesH = 150;
  let activeLineEditor = null; // {lineIndex, el}

  function initNotesPanel() {
    // Load summary notes
    const ta = document.getElementById('notes-textarea');
    try { const s = localStorage.getItem('lyricnote_notes'); if (s) { ta.value = s; updateNotesCount(); } } catch(e) {}
    ta.addEventListener('input', () => { updateNotesCount(); clearTimeout(notesSaveTimer); notesSaveTimer = setTimeout(saveNotes, 700); });

    // Load line notes
    try { const s = localStorage.getItem('lyricnote_line_notes'); if (s) lineNotes = JSON.parse(s); } catch(e) {}

    // Load dimensions
    try { const w = parseInt(localStorage.getItem('lyricnote_margin_w'),10); if (w>=120&&w<=500) marginW=w; } catch(e) {}
    try { const h = parseInt(localStorage.getItem('lyricnote_bottom_h'),10); if (h>=60&&h<=600) bottomNotesH=h; } catch(e) {}
    document.documentElement.style.setProperty('--margin-w', marginW+'px');
    document.documentElement.style.setProperty('--bottom-notes-h', bottomNotesH+'px');

    // Margin resize (drag right edge of margin col = column left boundary)
    const resizeHandle = document.getElementById('margin-resize');
    resizeHandle.addEventListener('mousedown', (e) => {
      e.preventDefault();
      const startX = e.clientX, startW = marginW;
      resizeHandle.classList.add('dragging');
      const onMove = (e) => {
        const newW = Math.max(120, Math.min(500, startW - (e.clientX - startX)));
        marginW = newW;
        document.documentElement.style.setProperty('--margin-w', newW+'px');
        document.getElementById('margin-col').style.width = newW+'px';
        syncMarginScroll();
        try { localStorage.setItem('lyricnote_margin_w', newW); } catch(e) {}
      };
      const onUp = () => { resizeHandle.classList.remove('dragging'); document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });

    // Bottom notes resize (drag handle)
    const bnHandle = document.getElementById('bottom-notes-handle');
    bnHandle.addEventListener('mousedown', (e) => {
      e.preventDefault();
      const startY = e.clientY, startH = bottomNotesH;
      bnHandle.classList.add('dragging');
      const onMove = (e) => {
        const newH = Math.max(60, Math.min(600, startH - (e.clientY - startY)));
        bottomNotesH = newH;
        document.documentElement.style.setProperty('--bottom-notes-h', newH+'px');
        document.getElementById('bottom-notes').style.height = newH+'px';
        try { localStorage.setItem('lyricnote_bottom_h', newH); } catch(e) {}
      };
      const onUp = () => { bnHandle.classList.remove('dragging'); document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });

    // Sync margin scroll with lyric scroll
    const lyricScroll = document.getElementById('lyric-scroll');
    const marginScroll = document.getElementById('margin-scroll');
    lyricScroll.addEventListener('scroll', syncMarginScroll);
    marginScroll.addEventListener('scroll', () => { lyricScroll.scrollTop = marginScroll.scrollTop; });
  }

  function syncMarginScroll() {
    const ls = document.getElementById('lyric-scroll');
    const ms = document.getElementById('margin-scroll');
    if (ms) ms.scrollTop = ls.scrollTop;
  }

  // ─── Notes visibility toggle ──────────────────────────
  function toggleNotesPanel() {
    notesVisible = !notesVisible;
    const btn = document.getElementById('notes-btn');
    const marginCol = document.getElementById('margin-col');
    const marginResize = document.getElementById('margin-resize');
    const bottomNotes = document.getElementById('bottom-notes');
    if (notesVisible) {
      marginCol.classList.remove('hidden');
      marginResize.classList.remove('hidden');
      bottomNotes.classList.remove('hidden');
      btn.classList.add('active');
      renderMarginNotes();
    } else {
      marginCol.classList.add('hidden');
      marginResize.classList.add('hidden');
      bottomNotes.classList.add('hidden');
      btn.classList.remove('active');
    }
  }
  function toggleMarginNotes() {
    document.getElementById('margin-col').classList.toggle('hidden');
    document.getElementById('margin-resize').classList.toggle('hidden');
  }

  // ─── Margin (per-line) notes ──────────────────────────
  function renderMarginNotes() {
    if (!notesVisible) return;
    const container = document.getElementById('margin-scroll');
    container.innerHTML = '';
    if (!lyrics) return;
    const lines = lyrics.split('\n');
    lines.forEach((line, lineIdx) => {
      const note = lineNotes.find(n => n.lineIndex === lineIdx);
      const row = document.createElement('div');
      row.className = 'margin-row' + (note ? ' has-note' : '');
      row.dataset.lineIdx = lineIdx;

      // Match height to corresponding lyric-block
      const lyricBlock = document.querySelectorAll('#lyric-container .lyric-block')[lineIdx];
      if (lyricBlock) {
        // Sync height after paint
        setTimeout(() => { row.style.minHeight = lyricBlock.offsetHeight + 'px'; }, 0);
      }

      if (note) {
        const textEl = document.createElement('div');
        textEl.className = 'margin-note-text';
        textEl.textContent = note.text;
        row.appendChild(textEl);
      } else {
        const ph = document.createElement('div');
        ph.className = 'margin-note-placeholder';
        ph.textContent = '+ 添加笔记';
        row.appendChild(ph);
      }

      row.addEventListener('click', () => openLineNoteEditor(lineIdx, row));
      container.appendChild(row);
    });
  }

  function openLineNoteEditor(lineIdx, rowEl) {
    // Close any existing editor
    if (activeLineEditor) closeLineNoteEditor(false);

    rowEl.classList.add('editing');
    rowEl.innerHTML = '';

    const note = lineNotes.find(n => n.lineIndex === lineIdx);
    const ta = document.createElement('textarea');
    ta.className = 'margin-note-input';
    ta.value = note ? note.text : '';
    ta.placeholder = '这行的练唱笔记...';
    ta.rows = 3;

    const footer = document.createElement('div');
    footer.className = 'margin-note-footer';

    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'mn-btn mn-btn-cancel';
    cancelBtn.textContent = '取消';
    cancelBtn.addEventListener('mousedown', (e) => { e.preventDefault(); closeLineNoteEditor(false); });

    const saveBtn = document.createElement('button');
    saveBtn.className = 'mn-btn mn-btn-save';
    saveBtn.textContent = '保存';
    saveBtn.addEventListener('mousedown', (e) => { e.preventDefault(); saveLineNote(lineIdx, ta.value.trim()); });

    footer.appendChild(cancelBtn);
    footer.appendChild(saveBtn);
    rowEl.appendChild(ta);
    rowEl.appendChild(footer);

    activeLineEditor = { lineIdx, rowEl };
    setTimeout(() => { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }, 30);

    // Save on Ctrl+Enter
    ta.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); saveLineNote(lineIdx, ta.value.trim()); }
      if (e.key === 'Escape') { e.preventDefault(); closeLineNoteEditor(false); }
    });
  }

  function saveLineNote(lineIdx, text) {
    lineNotes = lineNotes.filter(n => n.lineIndex !== lineIdx);
    if (text) lineNotes.push({ id: uid(), lineIndex: lineIdx, text });
    try { localStorage.setItem('lyricnote_line_notes', JSON.stringify(lineNotes)); } catch(e) {}
    closeLineNoteEditor(true);
  }

  function closeLineNoteEditor(rerender) {
    if (!activeLineEditor) return;
    activeLineEditor = null;
    if (rerender) renderMarginNotes();
    else {
      // Just restore the row visually without full re-render
      renderMarginNotes();
    }
  }

  // ─── Summary (bottom) notes ───────────────────────────
  function saveNotes() {
    const ta = document.getElementById('notes-textarea');
    try { localStorage.setItem('lyricnote_notes', ta.value); } catch(e) {}
    const ind = document.getElementById('notes-saved');
    ind.classList.add('show');
    setTimeout(() => ind.classList.remove('show'), 1600);
  }
  function updateNotesCount() {
    const ta = document.getElementById('notes-textarea');
    const len = ta.value.replace(/\s/g,'').length;
    document.getElementById('notes-char-count').textContent = len + ' 字';
  }
  function clearNotes() {
    if (!document.getElementById('notes-textarea').value.trim()) return;
    if (!confirm('确认清空整体笔记？')) return;
    document.getElementById('notes-textarea').value = '';
    updateNotesCount(); saveNotes();
  }
  function insertNote(text) {
    const ta = document.getElementById('notes-textarea');
    const start = ta.selectionStart, end = ta.selectionEnd;
    const before = ta.value.slice(0, start), after = ta.value.slice(end);
    const needsNL = before.length > 0 && !before.endsWith('\n');
    const ins = (needsNL ? '\n' : '') + text;
    ta.value = before + ins + after;
    const pos = before.length + ins.length;
    ta.setSelectionRange(pos, pos);
    ta.focus(); ta.dispatchEvent(new Event('input'));
  }
  function insertNoteNumbered() {
    const ta = document.getElementById('notes-textarea');
    let maxNum = 0;
    ta.value.split('\n').forEach(l => { const m = l.match(/^(\d+)\./); if (m) maxNum = Math.max(maxNum, parseInt(m[1],10)); });
    insertNote(`${maxNum + 1}. `);
  }

  // ─── Notes text parser (shared for export & preview) ──
  function parseNotesText(text, prefix) {
    return text.split('\n').map(line => {
      const t = line.trim();
      if (!t) return `<span class="${prefix}-blank"></span>`;
      if (/^[─—]{3,}$/.test(t)) return `<hr class="${prefix}-rule">`;
      if (/^[•·]\s/.test(t)) return `<span class="${prefix}-line ${prefix}-bullet">${escapeHtml(line)}</span>`;
      if (/^\d+\.\s/.test(t)) return `<span class="${prefix}-line ${prefix}-numbered">${escapeHtml(line)}</span>`;
      if (/^[☆★✦✧]\s/.test(t)) return `<span class="${prefix}-line ${prefix}-star">${escapeHtml(line)}</span>`;
      if (/^[→⇒➜➡]\s/.test(t)) return `<span class="${prefix}-line ${prefix}-arrow">${escapeHtml(line)}</span>`;
      return `<span class="${prefix}-line">${escapeHtml(line)}</span>`;
    }).join('');
  }
  function renderNotesAsExportHTML(text) { return parseNotesText(text, 'n'); }

  // Re-render margin notes after lyrics update
  function afterLyricsUpdate() {
    if (notesVisible) setTimeout(renderMarginNotes, 50);
  }

  init();
</script>
