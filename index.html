          <button class="notes-split-btn" id="bottom-notes-btn" onclick="toggleBottomNotesPanel()" title="整体笔记（底部）">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="14" width="18" height="7" rx="1"/><line x1="7" y1="3" x2="7" y2="11"/><line x1="12" y1="3" x2="12" y2="11"/><line x1="17" y1="5" x2="17" y2="11"/></svg>
            总结
          </button>
        </div>
        <button class="btn btn-outline" id="undo-btn" onclick="undo()" title="撤销 (⌘Z)" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-15-6.7L3 13"/></svg>
          撤销
        </button>
        <button class="btn btn-outline" id="section-btn" onclick="toggleSectionMode()" title="划分段落">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          段落
        </button>
        <button class="btn btn-outline" onclick="openModal(false)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          导入
        </button>
        <button class="btn btn-outline" id="edit-lyrics-btn" onclick="openModal(true)" style="display:none" title="编辑当前歌词">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>
          编辑
        </button>
        <button class="btn btn-outline" onclick="showPreview('pdf')" title="导出 PDF">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          PDF
        </button>
        <button class="btn btn-outline" onclick="showPreview('image')" title="导出图片">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          图片
        </button>
      </div>
    </div>

    <!-- Content: single scroll with lyric + margin note per row -->
    <div class="content-row">
      <div class="lyric-scroll" id="lyric-scroll">
        <div id="lyric-container"></div>
      </div>
    </div>

    <!-- Bottom notes bar: 整体总结 -->
    <div class="bottom-notes hidden" id="bottom-notes">
      <div class="bottom-notes-handle" id="bottom-notes-handle"></div>
      <div class="bottom-notes-header">
        <div class="bottom-notes-left">
          <span class="bottom-notes-title">整体笔记</span>
          <button class="qb-btn" onclick="insertNote('• ')">• 圆点</button>
          <button class="qb-btn" onclick="insertNoteNumbered()">1. 编号</button>
          <button class="qb-btn" onclick="insertNote('☆ ')">☆ 重点</button>
          <button class="qb-btn" onclick="insertNote('→ ')">→ 箭头</button>
          <span class="qb-sep"></span>
          <button class="qb-btn" onclick="insertNote('\n─────\n')">分隔线</button>
          <span class="qb-sep"></span>
          <button class="qb-btn" id="bottom-mic-btn" onclick="toggleVoiceInput('notes-textarea','bottom-mic-btn')" title="语音输入">🎤 语音</button>
        </div>
        <div class="bottom-notes-right">
          <span class="notes-char-count" id="notes-char-count">0 字</span>
          <span class="notes-saved-indicator" id="notes-saved">已保存</span>
          <button class="notes-action-btn danger" onclick="clearNotes()" title="清空整体笔记">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          </button>
        </div>
      </div>
      <div class="bottom-notes-body">
        <textarea id="notes-textarea" placeholder="在这里写整体练唱总结...

例如：
• 副歌第二句注意换气位置
1. 高音处气息要稳，不要紧
☆ 情感：第三段需要更有力量感"></textarea>
      </div>
    </div>
    </div><!-- /editor-view -->
  </div>
</div>

<!-- Float Toolbar -->
<div id="float-toolbar">
  <!-- Row 1: Colors -->
  <div class="tb-row">
    <span class="tb-row-label">色</span>
    <div id="palette"></div>
    <button class="palette-add-btn" id="hl-add-btn" onclick="openColorPicker('highlight',this)" title="自定义颜色，添加到色板">+</button>
    <button class="palette-edit-btn" id="palette-edit-btn" onclick="togglePaletteEditMode()" title="管理颜色">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/>
      </svg>
    </button>
    <div class="tb-sep"></div>
    <button class="toolbar-btn accent" onclick="openNoteEditor()" title="语音/文字备注">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
      备注
    </button>
  </div>
  <!-- Row 2: Symbols -->
  <div class="tb-row" style="padding-top:2px;border-top:1px solid var(--border);">
    <span class="tb-row-label">记</span>
    <!-- wavy -->
    <button class="sym-btn" onclick="addUnderlineMark('wavy')" title="波浪线">
      <div class="sym-inner"><span style="text-decoration:underline wavy #F43F5E;text-underline-offset:3px;text-decoration-thickness:2px;line-height:1;font-size:12px;">文</span></div>
      <div class="sym-tooltip">波浪线</div>
    </button>
    <!-- solid -->
    <button class="sym-btn" onclick="addUnderlineMark('solid')" title="连字符">
      <div class="sym-inner"><span style="border-bottom:3px solid #2563EB;padding-bottom:2px;line-height:1;font-size:12px;">文</span></div>
      <div class="sym-tooltip">连字符</div>
    </button>
    <!-- dashed -->
    <button class="sym-btn" onclick="addUnderlineMark('dashed')" title="虚线">
      <div class="sym-inner"><span style="border-bottom:2px dashed #059669;padding-bottom:2px;line-height:1;font-size:12px;">文</span></div>
      <div class="sym-tooltip">虚线</div>
    </button>
    <!-- dotted -->
    <button class="sym-btn" onclick="addUnderlineMark('dotted')" title="点线">
      <div class="sym-inner"><span style="border-bottom:2px dotted #C76754;padding-bottom:2px;line-height:1;font-size:12px;">文</span></div>
      <div class="sym-tooltip">点线</div>
    </button>
    <!-- double -->
    <button class="sym-btn" onclick="addUnderlineMark('double')" title="双线">
      <div class="sym-inner"><span style="border-bottom:3px double #EA580C;padding-bottom:2px;line-height:1;font-size:12px;">文</span></div>
      <div class="sym-tooltip">双线</div>
    </button>

  const ZOOM_LEVELS = [0.65, 0.8, 1.0, 1.25, 1.55, 1.9, 2.3, 2.8];
  let zoomIndex = 2;

  const DEFAULT_PALETTE = ['#FFF59D','#B3E5FC','#C8E6C9','#F8BBD0'];

    { id:'chorus',    label:'副歌',  cls:'sl-chorus',    color:'#E11D48' },

  function loadTcPalette() {

  let tcPalette = loadTcPalette();
  let tcPaletteEditMode = false;

  // All available fonts (superset)
  const ALL_FONTS = [
    { key:'serif',    label:'宋体',   family:"'Noto Serif SC', serif" },
    { key:'sans',     label:'黑体',   family:"'Noto Sans SC', sans-serif" },
    { key:'zcool',    label:'标宋',   family:"'ZCOOL XiaoWei', serif" },
    { key:'kuaile',   label:'圆体',   family:"'ZCOOL KuaiLe', sans-serif" },
    { key:'qingke',   label:'艺术体', family:"'ZCOOL QingKe HuangYou', sans-serif" },
    { key:'mashan',   label:'手写体', family:"'Ma Shan Zheng', cursive" },
    { key:'liujian',  label:'潦草体', family:"'Liu Jian Mao Cao', cursive" },
    { key:'longcang', label:'龙藏体', family:"'Long Cang', cursive" },
    { key:'zhimang',  label:'草书',   family:"'Zhi Mang Xing', cursive" },
    { key:'kaiti',    label:'楷体',   family:"KaiTi, STKaiti, 'Noto Serif SC', serif" },
    { key:'fangsong', label:'仿宋',   family:"FangSong, STFangsong, 'Noto Serif SC', serif" },
  ];
  const DEFAULT_FONT_KEYS = ['serif','sans','zcool','kuaile','qingke','mashan'];
  function loadFontPalette() {
    try { const r=localStorage.getItem('lyricnote_font_palette'); if(r){const a=JSON.parse(r);if(Array.isArray(a)&&a.length)return a;} } catch(e){}
    return [...DEFAULT_FONT_KEYS];
  }
  function saveFontPalette() { try { localStorage.setItem('lyricnote_font_palette', JSON.stringify(fontPaletteKeys)); } catch(e){} }
  let fontPaletteKeys = loadFontPalette();
  const FONT_OPTIONS = ALL_FONTS; // keep for annotation rendering lookup

  const CP_COLORS = [
    '#1F2937','#4B5563','#9CA3AF','#E5E7EB',
    '#EF4444','#F97316','#EAB308','#22C55E',
    '#3B82F6','#8B5CF6','#EC4899','#14B8A6',
    '#FCA5A5','#FED7AA','#FEF08A','#BBF7D0',
    '#BFDBFE','#DDD6FE','#FBCFE8','#A5F3FC',
    '#FFF59D','#B3E5FC','#C8E6C9','#F8BBD0',
  ];

  let cpCurrentColor = '#FFD54F';
  let cpMode = 'highlight'; // 'highlight' | 'textcolor'
  let cpAnchorEl = null;

  // ─── Init ─────────────────────────────────────────────
  function init() {
    setupSpeechRecognition();
    initVoiceInput();
    setupColorPicker();
    buildSectionPicker();
    renderPalette();
    renderTcPalette();
    renderFontBar();
    initNotesPanel();
    updateZoomUI();
    setupLoginKeyboard();
    // Migrate old single-state format if exists
    if (localStorage.getItem('lyricnote_state')) {
      migrateOldState();
    }
    // Auth will decide whether to show login or home screen
    initCloudSync();
    document.addEventListener('click', onDocClick);
  }

  function onDocClick(e) {
    // Close section picker if click outside
    const picker = document.getElementById('section-picker');
    if (picker.classList.contains('visible') && !picker.contains(e.target) && !e.target.closest('.section-trigger-btn') && !e.target.closest('.section-label')) {
      closeSectionPicker();
    }
  }

  // ─── Zoom ─────────────────────────────────────────────
  function adjustZoom(delta) {
    zoomIndex = Math.max(0, Math.min(ZOOM_LEVELS.length - 1, zoomIndex + delta));
    document.documentElement.style.setProperty('--font-scale', ZOOM_LEVELS[zoomIndex]);
    updateZoomUI();
    // Re-sync margin note heights after zoom
    if (marginNotesVisible) setTimeout(renderMarginNotes, 100);
    saveState();
  }
  function updateZoomUI() {
    const pct = Math.round(ZOOM_LEVELS[zoomIndex] * 100);
    document.getElementById('zoom-label').textContent = pct + '%';
    document.getElementById('zoom-out-btn').disabled = zoomIndex === 0;
    document.getElementById('zoom-in-btn').disabled  = zoomIndex === ZOOM_LEVELS.length - 1;
  }

  // ─── Song Title ────────────────────────────────────────
  function renderSongTitleDisplay() {
    const el = document.getElementById('song-title-display');
    if (el) {
      if (songTitle) { el.textContent = songTitle; el.classList.remove('placeholder'); el.title = '点击编辑'; }
      else { el.textContent = '+ 歌名'; el.classList.add('placeholder'); el.title = '点击添加'; }
    }
    const sn = document.getElementById('student-name-display');
    if (sn) {
      if (studentName) { sn.textContent = studentName; sn.classList.remove('placeholder'); sn.title = '点击编辑'; }
      else { sn.textContent = '+ 学生'; sn.classList.add('placeholder'); sn.title = '点击添加'; }
    }
    const ld = document.getElementById('lesson-date-display');
    if (ld) {
      if (lessonDate) { ld.textContent = lessonDate; ld.classList.remove('placeholder'); ld.title = '点击编辑'; }
      else { ld.textContent = '+ 日期'; ld.classList.add('placeholder'); ld.title = '点击添加'; }
    }
  }
  function startEditSongTitle() {
    const el = document.getElementById('song-title-display');
    const input = document.createElement('input');
    input.type = 'text'; input.className = 'song-title-input';
    input.value = songTitle; input.placeholder = '输入歌名...'; input.maxLength = 60;
    el.replaceWith(input); input.focus(); input.select();
    const finish = () => {
      songTitle = input.value.trim();
      const newEl = document.createElement('span');
      newEl.id = 'song-title-display'; newEl.className = 'song-title-display';
      newEl.onclick = startEditSongTitle; input.replaceWith(newEl);
      renderSongTitleDisplay(); saveState();
    };
    input.addEventListener('blur', finish);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
      if (e.key === 'Escape') { input.value = songTitle; input.blur(); }
    });
  }
  function startEditStudentName() {
    const el = document.getElementById('student-name-display');
    const input = document.createElement('input');
    input.type = 'text'; input.className = 'song-title-input';
    input.value = studentName; input.placeholder = '学生姓名...'; input.maxLength = 30;
    input.style.width = '100px';
    el.replaceWith(input); input.focus(); input.select();
    const finish = () => {
      studentName = input.value.trim();
      const newEl = document.createElement('span');
      newEl.id = 'student-name-display'; newEl.className = 'song-title-display';
      newEl.style.fontSize = '11px';
      newEl.onclick = startEditStudentName; input.replaceWith(newEl);
      renderSongTitleDisplay(); saveState();
    };
    input.addEventListener('blur', finish);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
      if (e.key === 'Escape') { input.value = studentName; input.blur(); }
    });
  }
  function startEditLessonDate() {
    const el = document.getElementById('lesson-date-display');
    openCalendar(el, 'header');
  }

  // ─── Speech ───────────────────────────────────────────
  function setupSpeechRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return;
    recognition = new SR();
    recognition.continuous = true; recognition.interimResults = true; recognition.lang = 'zh-CN';
    recognition.onresult = (e) => {
      let finalText = '', interimText = '';
      for (let i = 0; i < e.results.length; i++) {
        if (e.results[i].isFinal) finalText += e.results[i][0].transcript;
        else interimText += e.results[i][0].transcript;
      }
      const ta = document.getElementById('note-textarea');
      const sep = noteBaseText && !noteBaseText.endsWith(' ') && !noteBaseText.endsWith('\n') && finalText ? ' ' : '';
      ta.value = noteBaseText + sep + finalText + interimText;
      updateConfirmBtn();
    };
    recognition.onerror = (e) => {
      if (e.error === 'no-speech') return;
      if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
        isNoteRecording = false; setNoteStatus('no-permission');
        document.getElementById('note-mic-toggle').classList.remove('recording');
        document.getElementById('note-mic-label').textContent = '录音'; return;
      }
      stopNoteRecording();
    };
    recognition.onend = () => { if (isNoteRecording) { try { recognition.start(); } catch(err){} } };
  }

  // ─── General Voice Input (for side notes & bottom notes) ──
  let voiceRec = null;
  let voiceActive = false;
  let voiceTarget = null; // textarea element or id
  let voiceBtnId = null;
  let voiceBaseText = '';

  function initVoiceInput() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return;
    voiceRec = new SR();
    voiceRec.continuous = true;
    voiceRec.interimResults = true;
    voiceRec.lang = 'zh-CN';
    voiceRec.onresult = (e) => {
      let finalText = '', interimText = '';
      for (let i = 0; i < e.results.length; i++) {
        if (e.results[i].isFinal) finalText += e.results[i][0].transcript;
        else interimText += e.results[i][0].transcript;
      }
      const ta = typeof voiceTarget === 'string' ? document.getElementById(voiceTarget) : voiceTarget;
      if (!ta) return;
      const sep = voiceBaseText && !voiceBaseText.endsWith(' ') && !voiceBaseText.endsWith('\n') && finalText ? ' ' : '';
      ta.value = voiceBaseText + sep + finalText + interimText;
      ta.dispatchEvent(new Event('input'));
    };
    voiceRec.onerror = (e) => {
      if (e.error === 'no-speech') return;
      stopVoiceInput();
    };
    voiceRec.onend = () => { if (voiceActive) { try { voiceRec.start(); } catch(err){} } };
  }

  async function toggleVoiceInput(target, btnId) {
    if (voiceActive) { stopVoiceInput(); return; }
    if (!voiceRec) { alert('浏览器不支持语音输入'); return; }
    // Request mic permission
    try { const s = await navigator.mediaDevices.getUserMedia({audio:true}); s.getTracks().forEach(t=>t.stop()); } catch(err) { alert('麦克风权限被拒绝'); return; }
    voiceTarget = target;
    voiceBtnId = btnId;
    const ta = typeof target === 'string' ? document.getElementById(target) : target;
    if (ta) voiceBaseText = ta.value;
    voiceActive = true;
    const btn = document.getElementById(btnId);
    if (btn) { btn.style.background = '#FEF2F2'; btn.style.color = '#EF4444'; btn.textContent = '⏹ 停止'; }
    try { voiceRec.start(); } catch(e) {}
  }

  function stopVoiceInput() {
    voiceActive = false;
    if (voiceRec) { try { voiceRec.stop(); } catch(e) {} }
    if (voiceBtnId) {
      const btn = document.getElementById(voiceBtnId);
      if (btn) { btn.style.background = ''; btn.style.color = ''; btn.textContent = '🎤 语音'; }
    }
    voiceTarget = null;
    voiceBtnId = null;
  }

  // ─── Palette ──────────────────────────────────────────
  function loadPalette() {
    try { const r = localStorage.getItem('lyricnote_palette'); if (r) { const a = JSON.parse(r); if (Array.isArray(a) && a.length) return a; } } catch(e) {}
    return [...DEFAULT_PALETTE];
  }
  function savePalette() { try { localStorage.setItem('lyricnote_palette', JSON.stringify(palette)); } catch(e){} }

  function renderPalette() {
    const container = document.getElementById('palette');
    container.innerHTML = '';

      sw.addEventListener('dragstart', (e) => { if (!paletteEditMode){e.preventDefault();return;} sw.classList.add('dragging'); e.dataTransfer.setData('text/plain',String(idx)); });

      sw.addEventListener('dragover', (e) => { if (!paletteEditMode) return; e.preventDefault(); sw.classList.add('drag-over'); });

        if (!paletteEditMode) return; e.preventDefault(); sw.classList.remove('drag-over');
        const from = parseInt(e.dataTransfer.getData('text/plain'),10);
        const to = parseInt(sw.dataset.idx,10);
        if (isNaN(from)||isNaN(to)||from===to) return;
        const moved = palette.splice(from,1)[0]; palette.splice(to,0,moved);

  // ─── Custom Color Picker Panel ────────────────────────
  function setupColorPicker() {
    const colorInput = document.getElementById('cp-color-input');
    const hexInput   = document.getElementById('cp-hex-input');
    if (!colorInput) return;
    colorInput.addEventListener('input', (e) => setCpColor(e.target.value));
    hexInput.addEventListener('input', (e) => {
      let v = e.target.value.trim();
      if (!v.startsWith('#')) v = '#' + v;
      if (/^#[0-9A-Fa-f]{6}$/.test(v)) setCpColor(v, true);
    });
    hexInput.addEventListener('blur', () => {
      let v = hexInput.value.trim();
      if (!v.startsWith('#')) v = '#' + v;
      if (!/^#[0-9A-Fa-f]{6}$/.test(v)) setCpColor(cpCurrentColor);
    });
    hexInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') hexInput.blur(); });
  }

  function setCpColor(color, skipHexSync) {
    if (!/^#[0-9A-Fa-f]{6}$/.test(color)) return;
    cpCurrentColor = color;
    const ci = document.getElementById('cp-color-input');
    const hi = document.getElementById('cp-hex-input');
    const sw = document.getElementById('cp-preview-swatch');
    const icon = document.getElementById('cp-swatch-icon');
    if (ci) ci.value = color;
    if (!skipHexSync && hi) hi.value = color;
    if (sw) sw.style.background = color;
    if (icon) {
      const r=parseInt(color.slice(1,3),16), g=parseInt(color.slice(3,5),16), b=parseInt(color.slice(5,7),16);
      icon.style.color = (0.299*r+0.587*g+0.114*b)/255 > 0.6 ? 'rgba(0,0,0,0.35)' : 'rgba(255,255,255,0.9)';
    }
  }

  function openColorPicker(mode, anchorEl) {
    cpMode = mode; cpAnchorEl = anchorEl;
    const panel = document.getElementById('color-picker-panel');
    document.getElementById('cp-panel-title').textContent = mode === 'textcolor' ? '文字颜色' : '自定义颜色';

      s.draggable = true;

      palEl.addEventListener('dragleave', () => { palEl.style.outline=''; });
      palEl.addEventListener('drop', (e) => {
        e.preventDefault(); palEl.style.outline='';
        const color = e.dataTransfer.getData('text/plain');
        if (!color || !/^#[0-9A-Fa-f]{6}$/.test(color)) return;
        if (palId === 'palette') { if (!palette.includes(color)) { palette.push(color); savePalette(); } renderPalette(); }
        else { if (!tcPalette.includes(color)) { tcPalette.push(color); saveTcPalette(); } renderTcPalette(); }
        if (selRange) showToolbarAtSelection();
      });
    });

    // Build action buttons — always show both apply + add-to-palette

      if (selRange) { if (mode === 'textcolor') addTextColorMark(cpCurrentColor); else addColorMark(cpCurrentColor); }

    addBtn.className = 'cp-btn cp-btn-add';
    addBtn.textContent = mode === 'textcolor' ? '+ 字色板' : '+ 色板';

      if (!pal.includes(cpCurrentColor)) { pal.push(cpCurrentColor); mode === 'textcolor' ? saveTcPalette() : savePalette(); }
      mode === 'textcolor' ? renderTcPalette() : renderPalette();
      if (selRange) showToolbarAtSelection();
      closeColorPicker();

  function positionColorPicker(anchorEl) {

      if (left + pw > window.innerWidth - 12) left = window.innerWidth - pw - 12;
      if (left < 8) left = 8;
      if (top + ph > window.innerHeight - 8) top = rect.top - ph - 8;
      panel.style.left = (left + window.scrollX) + 'px';
      panel.style.top  = (top  + window.scrollY) + 'px';
    });

  // ─── Custom Calendar ──────────────────────────────────
  let calYear, calMonth, calCallback = null, calAnchorEl = null, calSource = null;
  const CAL_WEEKDAYS = ['日','一','二','三','四','五','六'];
  const CAL_MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

  function openCalendar(anchorEl, source) {
    calAnchorEl = anchorEl;
    calSource = source;
    const current = source === 'modal' ? (document.getElementById('lesson-date-trigger').dataset.value || '') : lessonDate;
    const d = current ? new Date(current) : new Date();
    calYear = d.getFullYear();
    calMonth = d.getMonth();
    calCallback = (dateStr) => {
      if (source === 'modal') {
        const trigger = document.getElementById('lesson-date-trigger');
        trigger.dataset.value = dateStr;
        const textEl = document.getElementById('lesson-date-text');
        if (dateStr) { textEl.textContent = dateStr; textEl.classList.remove('dt-placeholder'); }
        else { textEl.textContent = '选择日期'; textEl.classList.add('dt-placeholder'); }
      } else {
        lessonDate = dateStr;
        renderSongTitleDisplay();
        saveState();
      }
    };
    renderCalendar(current);
    const panel = document.getElementById('cal-panel');
    panel.classList.add('visible');
    // Prevent mousedown inside calendar from triggering the global close
    panel.onmousedown = (e) => e.stopPropagation();
    requestAnimationFrame(() => {
      const rect = anchorEl.getBoundingClientRect();
      const pw = 280, ph = panel.offsetHeight || 320;
      let left = rect.left, top = rect.bottom + 6;
      if (left + pw > window.innerWidth - 12) left = window.innerWidth - pw - 12;
      if (left < 8) left = 8;
      if (top + ph > window.innerHeight - 8) top = rect.top - ph - 6;
      panel.style.left = left + 'px';
      panel.style.top = top + 'px';
    });
  }

  function closeCalendar() {
    document.getElementById('cal-panel').classList.remove('visible');
    calAnchorEl = null;
  }

  function renderCalendar(selectedDate) {
    const panel = document.getElementById('cal-panel');
    const today = new Date();
    const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
    const firstDay = new Date(calYear, calMonth, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
    const daysInPrev = new Date(calYear, calMonth, 0).getDate();

    let daysHtml = '';
    // Previous month days
    for (let i = firstDay - 1; i >= 0; i--) {
      const d = daysInPrev - i;
      daysHtml += `<button class="cal-day other" disabled>${d}</button>`;
    }
    // Current month days
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const cls = ['cal-day'];
      if (dateStr === todayStr) cls.push('today');
      if (dateStr === selectedDate) cls.push('selected');
      daysHtml += `<button class="${cls.join(' ')}" onclick="selectCalDate('${dateStr}')">${d}</button>`;
    }
    // Next month days
    const totalCells = firstDay + daysInMonth;
    const remaining = (7 - totalCells % 7) % 7;
    for (let d = 1; d <= remaining; d++) {
      daysHtml += `<button class="cal-day other" disabled>${d}</button>`;
    }

    panel.innerHTML = `
      <div class="cal-header">
        <button class="cal-nav" onclick="calNav(-1)">‹</button>
        <span class="cal-month-label">${calYear}年 ${CAL_MONTHS[calMonth]}</span>
        <button class="cal-nav" onclick="calNav(1)">›</button>
      </div>
      <div class="cal-weekdays">${CAL_WEEKDAYS.map(w => `<span class="cal-weekday">${w}</span>`).join('')}</div>
      <div class="cal-days">${daysHtml}</div>
      <div class="cal-footer">
        <button class="cal-today-btn" onclick="selectCalDate('${todayStr}')">今天</button>
        <button class="cal-clear-btn" onclick="selectCalDate('')">清除</button>
      </div>`;
  }

  function calNav(delta) {
    calMonth += delta;
    if (calMonth < 0) { calMonth = 11; calYear--; }
    if (calMonth > 11) { calMonth = 0; calYear++; }
    const current = calSource === 'modal' ? (document.getElementById('lesson-date-trigger').dataset.value || '') : lessonDate;
    renderCalendar(current);
  }

  function selectCalDate(dateStr) {
    if (calCallback) calCallback(dateStr);
    closeCalendar();
  }
