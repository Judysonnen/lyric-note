  // ─── Lyrics Render ────────────────────────────────────
  function getCharColorAnn(absIdx) {
    const covering = annotations.filter(a => a.type==='color' && absIdx>=a.charIndex && absIdx<a.charIndex+(a.length||1));
    return covering.length > 0 ? covering[covering.length-1] : null;
  }
  function getCharNoteAnn(absIdx) {
    return annotations.find(a => a.type==='note' && absIdx>=a.charIndex && absIdx<a.charIndex+(a.length||1)) || null;
  }
  function getCharUlAnn(absIdx) {
    const covering = annotations.filter(a => a.type==='underline' && absIdx>=a.charIndex && absIdx<a.charIndex+(a.length||1));
    return covering.length > 0 ? covering[covering.length-1] : null;
  }
  function getCharUlAnns(absIdx) {
    return annotations.filter(a => a.type==='underline' && absIdx>=a.charIndex && absIdx<a.charIndex+(a.length||1));
  }
  function getCharTextColorAnn(absIdx) {
    const covering = annotations.filter(a => a.type==='textcolor' && absIdx>=a.charIndex && absIdx<a.charIndex+(a.length||1));
    return covering.length > 0 ? covering[covering.length-1] : null;
  }
  function getCharFontAnn(absIdx) {
    const covering = annotations.filter(a => a.type==='font' && absIdx>=a.charIndex && absIdx<a.charIndex+(a.length||1));
    return covering.length > 0 ? covering[covering.length-1] : null;
  }
  function addTextColorMark(color) {
    if (!selRange) return;
    const start=Math.min(selRange.start,selRange.end), len=Math.abs(selRange.end-selRange.start)+1;
    annotations = annotations.filter(a => !(a.type==='textcolor' && rangesOverlap(a,start,len)));
    annotations.push({id:uid(), charIndex:start, length:len, type:'textcolor', color});
    clearSelection(); renderLyrics(); saveState();
  }
  function addFontMark(fontKey) {
    if (!selRange) return;
    const start=Math.min(selRange.start,selRange.end), len=Math.abs(selRange.end-selRange.start)+1;
    annotations = annotations.filter(a => !(a.type==='font' && rangesOverlap(a,start,len)));
    annotations.push({id:uid(), charIndex:start, length:len, type:'font', fontKey});
    clearSelection(); renderLyrics(); saveState();
  }
  function clearTextStyling() {
    if (!selRange) return;
    const start=Math.min(selRange.start,selRange.end), len=Math.abs(selRange.end-selRange.start)+1;
    annotations = annotations.filter(a => !((a.type==='textcolor'||a.type==='font'||a.type==='bold'||a.type==='italic') && rangesOverlap(a,start,len)));
    clearSelection(); renderLyrics(); saveState();
  }

  // ─── Bold / Italic ───────────────────────────────────
  function getCharBoldAnn(absIdx) {
    return annotations.filter(a => a.type==='bold' && absIdx>=a.charIndex && absIdx<a.charIndex+(a.length||1)).pop() || null;
  }
  function getCharItalicAnn(absIdx) {
    return annotations.filter(a => a.type==='italic' && absIdx>=a.charIndex && absIdx<a.charIndex+(a.length||1)).pop() || null;
  }
  function addBoldMark() {
    if (!selRange) return;
    const start=Math.min(selRange.start,selRange.end), len=Math.abs(selRange.end-selRange.start)+1;
    const existing = annotations.filter(a => a.type==='bold' && rangesOverlap(a, start, len));
    if (existing.length > 0) {
      annotations = annotations.filter(a => !(a.type==='bold' && rangesOverlap(a, start, len)));
    } else {
      annotations.push({id:uid(), charIndex:start, length:len, type:'bold'});
    }
    clearSelection(); renderLyrics(); saveState();
  }
  function addItalicMark() {
    if (!selRange) return;
    const start=Math.min(selRange.start,selRange.end), len=Math.abs(selRange.end-selRange.start)+1;
    const existing = annotations.filter(a => a.type==='italic' && rangesOverlap(a, start, len));
    if (existing.length > 0) {
      annotations = annotations.filter(a => !(a.type==='italic' && rangesOverlap(a, start, len)));
    } else {
      annotations.push({id:uid(), charIndex:start, length:len, type:'italic'});
    }
    clearSelection(); renderLyrics(); saveState();
  }

  // ─── Project Management ────────────────────────────────
  function getProjectIndex() {
    try { const r = localStorage.getItem('lyricnote_projects_index'); return r ? JSON.parse(r) : []; } catch(e) { return []; }
  }
  // Aggregate all distinct student names with their song counts. Sorted by count desc.
  function getAllStudents() {
    const counts = new Map();
    getProjectIndex().forEach(p => {
      const name = (p.studentName || '').trim();
      if (!name) return;
      counts.set(name, (counts.get(name) || 0) + 1);
    });
    return Array.from(counts.entries())
      .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], 'zh'))
      .map(([name, count]) => ({ name, count }));
  }
  function saveProjectIndex(index) {
    try { localStorage.setItem('lyricnote_projects_index', JSON.stringify(index)); } catch(e) {}
  }

  // ── Undo stack ──────────────────────────────────────
  // Snapshot of editable state. Cap stack to keep memory under control.
  const HISTORY_MAX = 50;
  let historyStack = [];
  let isRestoringHistory = false;
  function snapshotState() {
    return {
      lyrics,
      annotations: JSON.parse(JSON.stringify(annotations)),
      sections: JSON.parse(JSON.stringify(sections)),
      lineNotes: JSON.parse(JSON.stringify(lineNotes || [])),
      songTitle, studentName, lessonDate,
      notes: (document.getElementById('notes-textarea') || {}).value || ''
    };
  }
  function pushHistory() {
    if (isRestoringHistory) return;
    if (!currentProjectId) return;
    historyStack.push(snapshotState());
    if (historyStack.length > HISTORY_MAX) historyStack.shift();
    refreshUndoBtn();
  }
  function refreshUndoBtn() {
    const b = document.getElementById('undo-btn');
    if (b) b.disabled = historyStack.length === 0;
  }
  function undo() {
    if (!historyStack.length) return;
    const prev = historyStack.pop();
    isRestoringHistory = true;
    try {
      lyrics = prev.lyrics;
      annotations = prev.annotations;
      sections = prev.sections;
      lineNotes = prev.lineNotes;
      songTitle = prev.songTitle;
      studentName = prev.studentName;
      lessonDate = prev.lessonDate;
      const ta = document.getElementById('notes-textarea');
      if (ta) { ta.value = prev.notes; if (typeof updateNotesCount === 'function') updateNotesCount(); }
      selRange = null;
      if (typeof renderLyrics === 'function') renderLyrics();
      if (typeof renderSongTitleDisplay === 'function') renderSongTitleDisplay();
      saveStateDirect();
      refreshUndoBtn();
    } finally {
      isRestoringHistory = false;
    }
  }
  function saveStateDirect() {
    if (!currentProjectId) return;
    try {
      const project = {
        id: currentProjectId,
        name: songTitle || '未命名歌词',
        lyrics, songTitle, studentName, lessonDate,
        annotations, sections, lineNotes, zoomIndex,
        notes: document.getElementById('notes-textarea').value,
        marginNotesVisible, bottomNotesVisible,
        updatedAt: Date.now()
      };
      localStorage.setItem('lyricnote_project_' + currentProjectId, JSON.stringify(project));
      const index = getProjectIndex();
      const entry = index.find(e => e.id === currentProjectId);
      if (entry) { entry.name = project.name; entry.studentName = studentName; entry.lessonDate = lessonDate; entry.updatedAt = project.updatedAt; }
      saveProjectIndex(index);
      cloudSaveProject(currentProjectId);
    } catch(e) {}
  }
  function saveState() {
    pushHistory();
    saveStateDirect();
  }
  // Ctrl/Cmd+Z hotkey
  document.addEventListener('keydown', (e) => {
    const meta = e.ctrlKey || e.metaKey;
    if (!meta || e.key.toLowerCase() !== 'z' || e.shiftKey) return;
    const t = e.target;
    // Don't fire inside text inputs (let native undo work there)
    if (t && (t.tagName === 'TEXTAREA' || t.tagName === 'INPUT' || t.isContentEditable)) return;
    if (!historyStack.length) return;
    e.preventDefault();
    undo();
  });

  function createProject(name) {
    const id = uid();
    currentProjectId = id;
    const now = Date.now();
    const entry = { id, name: name || '未命名歌词', createdAt: now, updatedAt: now };
    const index = getProjectIndex();
    index.unshift(entry);
    saveProjectIndex(index);
    return id;
  }

  function loadProject(id) {
    try {
      const raw = localStorage.getItem('lyricnote_project_' + id);
      if (!raw) return false;
      const s = JSON.parse(raw);
      currentProjectId = id;
      lyrics = s.lyrics || '';
      songTitle = s.songTitle || '';
      studentName = s.studentName || '';
      lessonDate = s.lessonDate || '';
      annotations = s.annotations || [];
      sections = s.sections || [];
      lineNotes = s.lineNotes || [];
      zoomIndex = typeof s.zoomIndex === 'number' ? s.zoomIndex : 2;
      document.documentElement.style.setProperty('--font-scale', ZOOM_LEVELS[zoomIndex]);
      const ta = document.getElementById('notes-textarea');
      ta.value = s.notes || '';
      marginNotesVisible = !!s.marginNotesVisible;
      bottomNotesVisible = !!s.bottomNotesVisible;
      // Update UI panels
      document.getElementById('margin-notes-btn').classList.toggle('active', marginNotesVisible);
      document.getElementById('bottom-notes-btn').classList.toggle('active', bottomNotesVisible);
      document.getElementById('bottom-notes').classList.toggle('hidden', !bottomNotesVisible);
      renderLyrics(); renderSongTitleDisplay(); updateZoomUI();
      document.getElementById('edit-lyrics-btn').style.display = '';
      showEditorView();
        updateNotesCount();
      return true;
    } catch(e) { return false; }
  }

  function deleteProject(id) {
    localStorage.removeItem('lyricnote_project_' + id);
    const index = getProjectIndex().filter(e => e.id !== id);
    saveProjectIndex(index);
    cloudDeleteProject(id);
    if (currentProjectId === id) {
      currentProjectId = null;
      resetEditorState();
      showHomeScreen();
    }
  }

  function closeProject() {
    if (currentProjectId) saveState();
    currentProjectId = null;
    resetEditorState();
    showHomeScreen();
  }

  function resetEditorState() {
    lyrics = ''; songTitle = ''; studentName = ''; lessonDate = '';
    annotations = []; sections = []; lineNotes = []; zoomIndex = 2; selRange = null;
    document.getElementById('notes-textarea').value = '';
    marginNotesVisible = false; bottomNotesVisible = false;
    document.getElementById('margin-notes-btn').classList.remove('active');
    document.getElementById('bottom-notes-btn').classList.remove('active');
    document.getElementById('bottom-notes').classList.add('hidden');
    document.getElementById('edit-lyrics-btn').style.display = 'none';
    document.documentElement.style.setProperty('--font-scale', 1);
    updateZoomUI(); updateNotesCount();
    historyStack = []; refreshUndoBtn();
  }

  // ─── Home Screen ──────────────────────────────────────
  function showHomeScreen() {
    document.getElementById('home-screen').style.display = '';
    document.getElementById('editor-view').style.display = 'none';
    renderHomeScreen();
  }
  function showEditorView() {
    document.getElementById('home-screen').style.display = 'none';
    const ev = document.getElementById('editor-view');
    ev.style.display = 'flex';
  }

  let homeSearchQuery = '';
  let homeStudentSearch = '';
  let selectedStudentFilter = null; // null = all, '' = ungrouped, 'name' = specific
  let homeSortMode = 'count'; // 'count' | 'recent' | 'name' | 'created'
  let showAllStudentChips = false;
  let _searchBound = false;

  function renderHomeScreen() {
    const container = document.getElementById('recent-projects');
    const allIndex = getProjectIndex();
    if (allIndex.length === 0) {
      _searchBound = false;
      container.innerHTML = '<div class="home-empty">还没有项目，导入歌词开始吧</div>';
      return;
    }

    if (!document.getElementById('project-search')) {
      _searchBound = false;
      container.innerHTML = `
        <div class="recent-header">我的歌词集 <span class="project-group-count" id="project-count">${allIndex.length}</span></div>
        <input class="project-search" id="project-search" placeholder="搜索歌曲、学生…">
        <div class="home-toolbar">
          <div class="home-toolbar-label">学生筛选 · Filter by student</div>
          <div class="home-toolbar-controls">
            <div class="stu-search-wrap">
              <span class="ss-ico">⌕</span>
              <input class="stu-search-input" id="student-search" placeholder="搜索学生..." autocomplete="off">
            </div>
            <div class="sort-select-wrap">
              <span>排序</span>
              <select class="home-sort-sel" id="home-sort">
                <option value="count">歌词最多</option>
                <option value="recent">最近上课</option>
                <option value="name">按姓名 A-Z</option>
                <option value="created">首次添加</option>
              </select>
            </div>
          </div>
        </div>
        <div class="student-chips" id="student-chips"></div>
        <div id="project-list"></div>`;
    }
    const countEl = document.getElementById('project-count');
    if (countEl) countEl.textContent = allIndex.length;

    if (!_searchBound) {
      _searchBound = true;
      const searchEl = document.getElementById('project-search');
      let composing = false;
      searchEl.addEventListener('compositionstart', () => { composing = true; });
      searchEl.addEventListener('compositionend', () => { composing = false; homeSearchQuery = searchEl.value; visibleCount = PAGE_SIZE; renderProjectList(); });
      searchEl.addEventListener('input', () => { if (!composing) { homeSearchQuery = searchEl.value; visibleCount = PAGE_SIZE; renderProjectList(); } });

      const stuSearchEl = document.getElementById('student-search');
      let stuComposing = false;
      stuSearchEl.addEventListener('compositionstart', () => { stuComposing = true; });
      stuSearchEl.addEventListener('compositionend', () => { stuComposing = false; homeStudentSearch = stuSearchEl.value; renderStudentChips(); });
      stuSearchEl.addEventListener('input', () => { if (!stuComposing) { homeStudentSearch = stuSearchEl.value; renderStudentChips(); } });

      const sortEl = document.getElementById('home-sort');
      sortEl.addEventListener('change', () => { homeSortMode = sortEl.value; renderStudentChips(); renderProjectList(); });
    }

    renderStudentChips();
    renderProjectList();
  }

  // Stable color palette assigned to students by hashing their name
  const STU_CHIP_COLORS = ['var(--primary)', 'var(--accent-lavender)', 'var(--accent-gold)', 'var(--accent-sage)', '#6B7B8C', '#B86838', '#5F8079', '#88775F'];
  function studentColor(name) {
    if (!name) return 'var(--muted)';
    let h = 0;
    for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
    return STU_CHIP_COLORS[h % STU_CHIP_COLORS.length];
  }

  function getSortedStudents(idx) {
    // idx: getProjectIndex() result
    const stuStats = new Map();
    let ungroupedCount = 0;
    idx.forEach(p => {
      const n = (p.studentName || '').trim();
      if (!n) { ungroupedCount++; return; }
      const s = stuStats.get(n) || { name: n, count: 0, latest: 0, earliest: Infinity };
      s.count++;
      s.latest = Math.max(s.latest, p.updatedAt || p.createdAt || 0);
      s.earliest = Math.min(s.earliest, p.createdAt || p.updatedAt || Infinity);
      stuStats.set(n, s);
    });
    const list = Array.from(stuStats.values());
    list.sort((a, b) => {
      if (homeSortMode === 'recent') return b.latest - a.latest;
      if (homeSortMode === 'name') return a.name.localeCompare(b.name, 'zh');
      if (homeSortMode === 'created') return a.earliest - b.earliest;
      return b.count - a.count || a.name.localeCompare(b.name, 'zh');
    });
    return { students: list, ungroupedCount };
  }

  const STU_CHIPS_VISIBLE = 8;

  function renderStudentChips() {
    const wrap = document.getElementById('student-chips');
    if (!wrap) return;
    const all = getProjectIndex();
    const { students, ungroupedCount } = getSortedStudents(all);
    const q = (homeStudentSearch || '').trim().toLowerCase();
    const filtered = q ? students.filter(s => s.name.toLowerCase().includes(q)) : students;
    const visible = showAllStudentChips ? filtered : filtered.slice(0, STU_CHIPS_VISIBLE);
    const overflow = filtered.length - visible.length;

    const items = [];
    items.push(`<button class="stu-chip${selectedStudentFilter === null ? ' active' : ''}" onclick="setStudentFilter(null)">全部<span class="stu-chip-count">${all.length}</span></button>`);
    visible.forEach(s => {
      const active = selectedStudentFilter === s.name;
      items.push(`<button class="stu-chip${active ? ' active' : ''}" style="--c:${studentColor(s.name)}" onclick="setStudentFilter(${JSON.stringify(s.name)})"><span class="stu-chip-dot"></span>${escHtml(s.name)}<span class="stu-chip-count">${s.count}</span></button>`);
    });
    if (overflow > 0) {
      items.push(`<button class="stu-chip is-more" onclick="expandStudentChips()">+ ${overflow}<span class="stu-chip-count">余</span></button>`);
    } else if (showAllStudentChips && filtered.length > STU_CHIPS_VISIBLE) {
      items.push(`<button class="stu-chip is-more" onclick="collapseStudentChips()">收起</button>`);
    }
    if (ungroupedCount > 0 && !q) {
      items.push(`<button class="stu-chip is-other${selectedStudentFilter === '' ? ' active' : ''}" onclick="setStudentFilter('')">未指定<span class="stu-chip-count">${ungroupedCount}</span></button>`);
    }
    wrap.innerHTML = items.join('');
  }

  function setStudentFilter(name) {
    selectedStudentFilter = name;
    visibleCount = PAGE_SIZE;
    renderStudentChips();
    renderProjectList();
  }
  function expandStudentChips() { showAllStudentChips = true; renderStudentChips(); }
  function collapseStudentChips() { showAllStudentChips = false; renderStudentChips(); }

  const PAGE_SIZE = 20;
  let visibleCount = PAGE_SIZE;
  let collapsedGroups = {}; // legacy, unused

  function renderProjectList() {
    const listEl = document.getElementById('project-list');
    if (!listEl) return;
    let allIndex = getProjectIndex().sort((a,b) => (b.updatedAt||0) - (a.updatedAt||0));
    // Apply student filter
    if (selectedStudentFilter !== null) {
      allIndex = allIndex.filter(p => (p.studentName || '') === selectedStudentFilter);
    }
    const q = homeSearchQuery.toLowerCase();
    const index = q ? allIndex.filter(p =>
      (p.name||'').toLowerCase().includes(q) ||
      (p.studentName||'').toLowerCase().includes(q) ||
      (p.lessonDate||'').toLowerCase().includes(q)
    ) : allIndex;

    if (index.length === 0) {
      listEl.innerHTML = selectedStudentFilter
        ? `<div class="home-empty">「${escHtml(selectedStudentFilter || '未指定')}」名下还没有歌词</div>`
        : '<div class="home-empty">没有匹配的项目</div>';
      return;
    }

    const showAll = !!q || selectedStudentFilter !== null;
    const displayCount = showAll ? index.length : Math.min(visibleCount, index.length);
    const displayIndex = index.slice(0, displayCount);
    const hasMore = !showAll && index.length > displayCount;

    const fmtDate = (ts) => { if (!ts) return ''; const d = new Date(ts); return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };

    let html = '<div class="recent-list">';
    displayIndex.forEach(p => {
      const metaParts = [];
      if (p.studentName && selectedStudentFilter !== p.studentName) metaParts.push(p.studentName);
      if (p.lessonDate) metaParts.push(p.lessonDate);
      if (p.createdAt) metaParts.push('创建 ' + fmtDate(p.createdAt));
      if (p.updatedAt && p.updatedAt !== p.createdAt) metaParts.push('修改 ' + fmtDate(p.updatedAt));
      const dotColor = p.studentName ? studentColor(p.studentName) : 'var(--muted)';
      html += `<div class="recent-item" onclick="loadProject('${p.id}')">
        <div class="recent-item-icon" style="color: ${dotColor};">♪</div>
        <div class="recent-item-info">
          <div class="recent-item-name">${escHtml(p.name || '未命名歌词')}</div>
          <div class="recent-item-meta">${escHtml(metaParts.join(' · '))}</div>
        </div>
        <button class="recent-item-del" onclick="event.stopPropagation();deleteProjectConfirm('${p.id}')" title="删除">×</button>
      </div>`;
    });
    html += '</div>';

    if (hasMore) {
      const remaining = index.length - displayCount;
      html += `<button class="show-more-btn" onclick="showMoreProjects()">显示更多（还有 ${remaining} 个项目）</button>`;
    }

    listEl.innerHTML = html;
  }

  function showMoreProjects() {
    visibleCount += PAGE_SIZE;
    renderProjectList();
  }

  function toggleGroup(gid) {
    collapsedGroups[gid] = !collapsedGroups[gid];
    renderProjectList();
  }

  function deleteProjectConfirm(id) {
    const index = getProjectIndex();
    const p = index.find(e => e.id === id);
    const name = p ? p.name : '未命名';
    if (confirm('确定要删除「' + name + '」吗？此操作不可恢复。')) {
      deleteProject(id);
      renderHomeScreen();
    }
  }

  // ─── File Save / Open ──────────────────────────────────
  let lastFileHandle = null; // remember last saved file handle for quick re-save

  async function saveProjectToFile() {
    if (!currentProjectId || !lyrics) return;
    saveState();
    const raw = localStorage.getItem('lyricnote_project_' + currentProjectId);
    const project = JSON.parse(raw);
    project._format = 'lyricnote';
    project._version = 1;
    const jsonStr = JSON.stringify(project, null, 2);
    // File name: title_student_date
    const parts = [songTitle || '未命名', studentName, lessonDate].filter(Boolean);
    const safeName = parts.join('_').replace(/[^\w\u4e00-\u9fa5\-]/g, '_');

    // Try File System Access API (Chrome/Edge) — shows native Save dialog
    if (window.showSaveFilePicker) {
      try {
        const opts = {
          suggestedName: safeName + '.lyricnote.json',
          types: [{ description: 'LyricNote 项目', accept: { 'application/json': ['.lyricnote.json'] } }]
        };
        // If we saved before, try to reuse the same directory
        if (lastFileHandle) { try { opts.startIn = lastFileHandle; } catch(e) {} }
        const fileHandle = await window.showSaveFilePicker(opts);
        lastFileHandle = fileHandle;
        const writable = await fileHandle.createWritable();
        await writable.write(jsonStr);
        await writable.close();
        showSaveIndicator('已保存');
        return;
      } catch(e) {
        if (e.name === 'AbortError') return;
        console.error('Save picker failed, using download fallback', e);
      }
    }
    // Fallback: download
    const blob = new Blob([jsonStr], { type: 'application/json' });
    const link = document.createElement('a');
    link.download = safeName + '.lyricnote.json';
    link.href = URL.createObjectURL(blob);
    link.click();
    URL.revokeObjectURL(link.href);
    showSaveIndicator('已下载');
  }

  function showSaveIndicator(text) {
    const ind = document.getElementById('notes-saved');
    ind.textContent = text;
    ind.classList.add('show');
    setTimeout(() => { ind.classList.remove('show'); ind.textContent = '已保存'; }, 2200);
  }

  async function openFileFromDisk() {
    if (window.showOpenFilePicker) {
      try {
        const [fileHandle] = await window.showOpenFilePicker({
          types: [{ description: 'LyricNote 文件', accept: { 'application/json': ['.json', '.lyricnote.json'] } }],
          multiple: false
        });
        const file = await fileHandle.getFile();
        const text = await file.text();
        const data = JSON.parse(text);
        if (!data.lyrics) { alert('无效的 LyricNote 文件'); return; }
        importProjectFromData(data);
        return;
      } catch(e) {
        if (e.name === 'AbortError') return;
      }
    }
    // Fallback
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json,.lyricnote.json';
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          if (!data.lyrics) { alert('无效的 LyricNote 文件'); return; }
          importProjectFromData(data);
        } catch(err) { alert('文件解析失败：' + err.message); }
      };
      reader.readAsText(file);
    };
    input.click();
  }

  function importProjectFromData(data) {
    const id = uid();
    currentProjectId = id;
    lyrics = data.lyrics || '';
    songTitle = data.songTitle || data.name || '未命名';
    studentName = data.studentName || '';
    lessonDate = data.lessonDate || '';
    annotations = data.annotations || [];
    sections = data.sections || [];
    lineNotes = data.lineNotes || [];
    zoomIndex = typeof data.zoomIndex === 'number' ? data.zoomIndex : 2;
    document.getElementById('notes-textarea').value = data.notes || '';
    marginNotesVisible = !!data.marginNotesVisible;
    bottomNotesVisible = !!data.bottomNotesVisible;
    const now = Date.now();
    const entry = { id, name: songTitle, createdAt: data.createdAt || now, updatedAt: now };
    const index = getProjectIndex();
    index.unshift(entry);
    saveProjectIndex(index);
    saveState();
    document.documentElement.style.setProperty('--font-scale', ZOOM_LEVELS[zoomIndex]);
    document.getElementById('margin-notes-btn').classList.toggle('active', marginNotesVisible);
    document.getElementById('bottom-notes-btn').classList.toggle('active', bottomNotesVisible);
    document.getElementById('bottom-notes').classList.toggle('hidden', !bottomNotesVisible);
    renderLyrics(); renderSongTitleDisplay(); updateZoomUI();
    document.getElementById('edit-lyrics-btn').style.display = '';
    showEditorView();
    updateNotesCount();
  }

  // ─── Migration from old format ────────────────────────
  function migrateOldState() {
    try {
      const raw = localStorage.getItem('lyricnote_state');
      if (!raw) return;
      const s = JSON.parse(raw);
      if (!s || !s.lyrics) { localStorage.removeItem('lyricnote_state'); return; }
      const oldNotes = localStorage.getItem('lyricnote_notes') || '';
      const oldLineNotes = localStorage.getItem('lyricnote_line_notes');
      importProjectFromData({
        lyrics: s.lyrics, songTitle: s.songTitle || '',
        annotations: s.annotations || [], sections: s.sections || [],
        lineNotes: oldLineNotes ? JSON.parse(oldLineNotes) : (s.lineNotes || []),
        zoomIndex: s.zoomIndex || 2, notes: s.notes || oldNotes,
        marginNotesVisible: s.marginNotesVisible, bottomNotesVisible: s.bottomNotesVisible,
        createdAt: s.savedAt || Date.now()
      });
      localStorage.removeItem('lyricnote_state');
      localStorage.removeItem('lyricnote_notes');
      localStorage.removeItem('lyricnote_line_notes');
    } catch(e) { console.error('Migration failed:', e); }
  }

  function renderLyrics() {
    const container = document.getElementById('lyric-container');
    container.innerHTML = '';
    container.classList.toggle('section-mode', sectionMode);

    if (!lyrics) {
      const em = document.createElement('div');
      em.className = 'empty-state';
      em.innerHTML = `<div class="empty-icon">🎵</div><div class="empty-title">还没有歌词</div><div class="empty-hint">点击「导入」粘贴歌词，开始标注练唱。</div>
        <button class="btn btn-primary" onclick="openModal(false)" style="font-size:14px;padding:10px 22px;border-radius:12px;margin-top:8px;">导入新歌词</button>`;
      container.appendChild(em); return;
    }

    const lines = lyrics.split('\n');
    let gi = 0;

    lines.forEach((line, lineIdx) => {
      const block = document.createElement('div');
      block.className = 'lyric-block';

      // Section label
      const sec = sections.find(s => s.lineIndex === lineIdx);
      if (sec) {
        const tag = SECTION_TAGS.find(t => t.id === sec.tag);
        if (tag) {
          const lrow = document.createElement('div');
          lrow.className = 'section-label-row';
          const lbl = document.createElement('div');
          lbl.className = `section-label ${tag.cls} clickable`;
          lbl.title = '点击修改/删除段落';
          lbl.innerHTML = `<span class="sl-dot"></span>${tag.label}`;
          lbl.addEventListener('click', (e) => { e.stopPropagation(); openSectionPicker(lineIdx, lbl); });
          lrow.appendChild(lbl);
          block.appendChild(lrow);
        }
      }

      const outer = document.createElement('div');
      outer.className = 'lyric-line-outer';

      // Section trigger button
      const trigger = document.createElement('div');
      trigger.className = 'section-trigger';
      const trigBtn = document.createElement('div');
      trigBtn.className = 'section-trigger-btn' + (sec ? ' has-sec' : '');
      trigBtn.textContent = sec ? '✎' : '+';
      trigBtn.title = sec ? '修改段落' : '添加段落';
      trigBtn.addEventListener('click', (e) => { e.stopPropagation(); openSectionPicker(lineIdx, trigBtn); });
      trigger.appendChild(trigBtn);
      outer.appendChild(trigger);

      const lineDiv = document.createElement('div');
      lineDiv.className = 'lyric-line';

      const chars = Array.from(line);
      chars.forEach((ch, ci) => {
        const absIdx = gi + ci;
        const wrap = document.createElement('div');
        wrap.className = 'char-wrap';
        const span = document.createElement('span');
        span.className = 'lyric-char';
        if (ch === ' ') span.classList.add('lyric-space');
        span.dataset.idx = absIdx;
        span.textContent = ch;

        // Color
        const myAnn = getCharColorAnn(absIdx);
        if (myAnn) {
          span.classList.add('mark');
          span.style.setProperty('--mark-color', myAnn.color);
          const prevA = ci>0 ? getCharColorAnn(absIdx-1) : null;
          const nextA = ci<chars.length-1 ? getCharColorAnn(absIdx+1) : null;
          if (!prevA||prevA.id!==myAnn.id) span.classList.add('mark-start');
          if (!nextA||nextA.id!==myAnn.id) span.classList.add('mark-end');
        }

        // Note underline
        const noteAnn = getCharNoteAnn(absIdx);
        if (noteAnn) {
          span.classList.add('has-note');
          const pn = ci>0 ? getCharNoteAnn(absIdx-1) : null;
          const nn = ci<chars.length-1 ? getCharNoteAnn(absIdx+1) : null;
          const iS = !pn||pn.id!==noteAnn.id, iE = !nn||nn.id!==noteAnn.id;
          if (iS&&iE) span.classList.add('has-note-single');
          else if (iS) span.classList.add('has-note-start');
          else if (iE) span.classList.add('has-note-end');
          else span.classList.add('has-note-inner');
        }

        // Underline/symbol marks (support multiple per char)
        const ulAnns = getCharUlAnns(absIdx);
        const ulAnn = ulAnns.length > 0 ? ulAnns[ulAnns.length-1] : null;
        if (ch.trim()) {
          ulAnns.forEach(ua => {
            const st = ua.style;
            if (['wavy','solid','dashed','dotted','double'].includes(st)) {
              span.classList.add('ul-' + st);
            }
          });
        }

        // Text color
        const tcAnn = getCharTextColorAnn(absIdx);
        if (tcAnn) {
          span.style.color = tcAnn.color;
        }

        // Font family
        const fontAnn = getCharFontAnn(absIdx);
        if (fontAnn) { const fo=FONT_OPTIONS.find(f=>f.key===fontAnn.fontKey); if(fo) span.style.fontFamily=fo.family; }

        // Bold / Italic
        if (getCharBoldAnn(absIdx)) span.style.fontWeight = '700';
        if (getCharItalicAnn(absIdx)) span.style.fontStyle = 'italic';

        // Selection highlight
        if (selRange && absIdx >= Math.min(selRange.start,selRange.end) && absIdx <= Math.max(selRange.start,selRange.end)) span.classList.add('sel');

        span.addEventListener('mousedown', (e) => { e.preventDefault(); startSel(absIdx); });
        span.addEventListener('mousemove', () => { if (isSelecting) extSel(absIdx); });
        span.addEventListener('touchstart', (e) => { e.preventDefault(); startSel(absIdx); }, {passive:false});

        wrap.appendChild(span);

        // Note tag
        if (noteAnn) {
          const nxt = ci<chars.length-1 ? getCharNoteAnn(absIdx+1) : null;
          if (!nxt||nxt.id!==noteAnn.id) {
            const tag = document.createElement('span');
            tag.className = 'note-tag'; tag.textContent = noteAnn.content;
            tag.addEventListener('click', (e) => { e.stopPropagation(); showPopover(e, noteAnn); });
            tag.addEventListener('mousedown', (e) => e.stopPropagation());
            tag.addEventListener('touchstart', (e) => { e.stopPropagation(); e.preventDefault(); showPopover(e, noteAnn); }, {passive:false});
            wrap.appendChild(tag);
          }
        }

        // Symbol marks (rendered after span is in DOM)
        if (ch.trim()) {
          ulAnns.forEach(ua => {
            const st = ua.style;
            if (!['wavy','solid','dashed','dotted','double'].includes(st)) {
              const sym = document.createElement('span');
              sym.className = 'sym-mark sym-' + st;
              wrap.appendChild(sym);
            }
          });
        }

        // Unified del × — collect all removable annotations on this char
        {
          const removables = [];
          if (myAnn) {
            const nextA2 = ci<chars.length-1 ? getCharColorAnn(absIdx+1) : null;
            if (!nextA2||nextA2.id!==myAnn.id) removables.push({id:myAnn.id, label:'高亮色块', color:myAnn.color});
          }
          if (tcAnn) {
            const nextTc = ci<chars.length-1 ? getCharTextColorAnn(absIdx+1) : null;
            if (!nextTc||nextTc.id!==tcAnn.id) removables.push({id:tcAnn.id, label:'文字颜色', color:tcAnn.color});
          }
          if (fontAnn) {
            const nextFa = ci<chars.length-1 ? getCharFontAnn(absIdx+1) : null;
            if (!nextFa||nextFa.id!==fontAnn.id) { const fo=FONT_OPTIONS.find(f=>f.key===fontAnn.fontKey); removables.push({id:fontAnn.id, label:'字体: '+(fo?fo.label:fontAnn.fontKey), color:'#94A3B8'}); }
          }
          const boldAnn = getCharBoldAnn(absIdx);
          if (boldAnn) removables.push({id:boldAnn.id, label:'加粗', color:'#1F2937'});
          const italicAnn = getCharItalicAnn(absIdx);
          if (italicAnn) removables.push({id:italicAnn.id, label:'斜体', color:'#64748B'});
          ulAnns.forEach(ua => {
            const nxtUl2 = ci<chars.length-1 ? getCharUlAnns(absIdx+1).find(a=>a.id===ua.id) : null;
            if (!nxtUl2) {
              const STYLE_LABELS = {wavy:'波浪线',solid:'连字符',dashed:'虚线',dotted:'点线',double:'双线',triangle:'三角',dotbelow:'圆点',accent:'重音',slur:'连音弧',breath:'换气(后)','breath-before':'换气(前)'};
              removables.push({id:ua.id, label:STYLE_LABELS[ua.style]||ua.style, color:'#475569'});
            }
          });
          if (removables.length === 1) {
            const delX = document.createElement('div');
            delX.className = 'del-x active'; delX.textContent = '×'; delX.title = '删除 ' + removables[0].label;
            delX.addEventListener('mousedown', (e) => { e.stopPropagation(); e.preventDefault(); });
            delX.addEventListener('touchstart', (e) => { e.stopPropagation(); e.preventDefault(); deleteAnnotation(removables[0].id); }, {passive:false});
            delX.addEventListener('click', (e) => { e.stopPropagation(); deleteAnnotation(removables[0].id); });
            wrap.appendChild(delX);
          } else if (removables.length > 1) {
            const delX = document.createElement('div');
            delX.className = 'del-x active'; delX.textContent = '×'; delX.title = '删除标注…';
            delX.addEventListener('mousedown', (e) => { e.stopPropagation(); e.preventDefault(); });
            delX.addEventListener('touchstart', (e) => { e.stopPropagation(); e.preventDefault(); showAnnRemoveMenu(e, removables); }, {passive:false});
            delX.addEventListener('click', (e) => { e.stopPropagation(); showAnnRemoveMenu(e, removables); });
            wrap.appendChild(delX);
          }
        }

        lineDiv.appendChild(wrap);
      });

      gi += line.length + 1;
      outer.appendChild(lineDiv);
      block.appendChild(outer);

      if (marginNotesVisible) {
        // Wrap lyric-block + margin-cell in a single row for perfect alignment
        const row = document.createElement('div');
        row.className = 'lyric-row';
        row.appendChild(block);

        const note = lineNotes.find(n => n.lineIndex === lineIdx);
        const cell = document.createElement('div');
        cell.className = 'margin-cell' + (note ? ' has-note' : '');

        if (note) {
          const textEl = document.createElement('div');
          textEl.className = 'margin-note-text';
          textEl.textContent = note.text;
          cell.appendChild(textEl);
        }
        const ph = document.createElement('div');
        ph.className = 'margin-note-placeholder';
        ph.textContent = note ? '✎ 编辑' : '+ 添加笔记';
        cell.appendChild(ph);

        cell.addEventListener('click', (e) => {
          if (e.target.closest('.mn-btn')) return;
          openLineNoteEditor(lineIdx, cell);
        });

        // Hover: only when mouse is on the margin cell
        cell.addEventListener('mouseenter', () => row.classList.add('margin-highlight'));
        cell.addEventListener('mouseleave', () => row.classList.remove('margin-highlight'));

        row.appendChild(cell);
        container.appendChild(row);
      } else {
        container.appendChild(block);
      }
    });
  }

  // ─── Selection ────────────────────────────────────────
  function updateSelectionClasses() {
    const all = document.querySelectorAll('#lyric-container .lyric-char');
    if (!selRange) { all.forEach(el => el.classList.remove('sel')); return; }
    const lo = Math.min(selRange.start,selRange.end), hi = Math.max(selRange.start,selRange.end);
    all.forEach(el => {
      const idx = parseInt(el.dataset.idx,10);
      if (idx>=lo && idx<=hi) el.classList.add('sel'); else el.classList.remove('sel');
    });
  }
  function startSel(idx) { isSelecting=true; selRange={start:idx,end:idx}; hideToolbar(); updateSelectionClasses(); }
  function extSel(idx)  { if (!isSelecting) return; if (selRange&&selRange.end===idx) return; selRange={...selRange,end:idx}; updateSelectionClasses(); }
  function endSel()     { if (isSelecting&&selRange) { isSelecting=false; showToolbarAtSelection(); } else isSelecting=false; }
  function clearSelection() { selRange=null; hideToolbar(); updateSelectionClasses(); }

  document.addEventListener('mouseup', endSel);
  document.addEventListener('touchend', endSel);
  document.addEventListener('touchcancel', endSel);
  document.addEventListener('touchmove', (e) => {
    if (!isSelecting) return;
    const t = e.touches[0]; if (!t) return;
    const el = document.elementFromPoint(t.clientX, t.clientY); if (!el) return;
    const charEl = el.closest('.lyric-char');
    if (charEl && charEl.dataset.idx !== undefined) { e.preventDefault(); extSel(parseInt(charEl.dataset.idx,10)); }
  }, {passive:false});

  document.addEventListener('mousedown', (e) => {
    if (!e.target.closest('#ann-remove-menu,.del-x')) closeAnnRemoveMenu();
    if (paletteEditMode && !e.target.closest('#palette,#palette-edit-btn')) { paletteEditMode=false; renderPalette(); if (selRange) showToolbarAtSelection(); }
    if (tcPaletteEditMode && !e.target.closest('#tc-palette,#tc-edit-btn')) { tcPaletteEditMode=false; renderTcPalette(); if (selRange) showToolbarAtSelection(); }
    if (!e.target.closest('#color-picker-panel,#hl-add-btn,#tc-add-btn')) closeColorPicker();
    if (!e.target.closest('#font-picker-panel,#font-add-btn')) closeFontPicker();
    if (!e.target.closest('#cal-panel,.date-trigger,#lesson-date-display')) closeCalendar();
    const inI = e.target.closest('.lyric-char,.note-tag,#float-toolbar,#note-editor,#popover-box,.modal,.preview-modal,.btn,.del-x,.song-title-display,.song-title-input,.section-trigger-btn,.section-label,#color-picker-panel,#font-picker-panel,#cal-panel,.palette-add-btn,.margin-cell,#ann-remove-menu');
    if (!inI && selRange) clearSelection();
  });
  document.addEventListener('touchstart', (e) => {
    if (!e.target.closest('#ann-remove-menu,.del-x')) closeAnnRemoveMenu();
    if (!e.target.closest('#color-picker-panel,#hl-add-btn,#tc-add-btn')) closeColorPicker();
    if (!e.target.closest('#font-picker-panel,#font-add-btn')) closeFontPicker();
    if (!e.target.closest('#cal-panel,.date-trigger,#lesson-date-display')) closeCalendar();
    const inI = e.target.closest('.lyric-char,.note-tag,#float-toolbar,#note-editor,#popover-box,.modal,.preview-modal,.btn,.del-x,.song-title-display,.song-title-input,.swatch-del,.color-swatch,.section-trigger-btn,.section-label,#color-picker-panel,#font-picker-panel,#cal-panel,.palette-add-btn,.margin-cell,#ann-remove-menu');
    if (!inI) { if (paletteEditMode){paletteEditMode=false;renderPalette();} if (selRange) clearSelection(); }
  }, {passive:true});

  // ─── Positioning ──────────────────────────────────────
  function getSelectionBounds() {
    if (!selRange) return null;
    const lo=Math.min(selRange.start,selRange.end), hi=Math.max(selRange.start,selRange.end);
    const sEl=document.querySelector(`.lyric-char[data-idx="${lo}"]`);
    const eEl=document.querySelector(`.lyric-char[data-idx="${hi}"]`);
    if (!sEl||!eEl) return null;
    const sR=sEl.getBoundingClientRect(), eR=eEl.getBoundingClientRect();
    return {
      left:Math.min(sR.left,eR.left), right:Math.max(sR.right,eR.right),
      top:Math.min(sR.top,eR.top), bottom:Math.max(sR.bottom,eR.bottom),
      centerX:(Math.min(sR.left,eR.left)+Math.max(sR.right,eR.right))/2
    };
  }
  function positionFloat(el, flippedClass='flipped') {
    const bounds=getSelectionBounds(); if (!bounds) return;
    requestAnimationFrame(() => {
      const r=el.getBoundingClientRect(), w=r.width, h=r.height, gap=14, margin=10;
      let left=bounds.centerX-w/2, top=bounds.bottom+gap, flipped=false;
      if (top+h>window.innerHeight-margin) { top=bounds.top-h-gap; flipped=true; }
      if (top<margin) { top=Math.max(margin,bounds.bottom+gap); flipped=false; }
      if (left<margin) left=margin;
      if (left+w>window.innerWidth-margin) left=window.innerWidth-w-margin;
      const arrowX=Math.max(16,Math.min(w-16,bounds.centerX-left));
      el.style.setProperty('--arrow-x', arrowX+'px');
      if (flipped) el.classList.add(flippedClass); else el.classList.remove(flippedClass);
      el.style.left=(left+window.scrollX)+'px';
      el.style.top=(top+window.scrollY)+'px';
    });
  }
  function showToolbarAtSelection() { const tb=document.getElementById('float-toolbar'); tb.classList.add('visible'); positionFloat(tb); }
  function hideToolbar() {
    document.getElementById('float-toolbar').classList.remove('visible');
    closeColorPicker();
    closeFontPicker();
  }

  // ─── Annotations ──────────────────────────────────────
  function addColorMark(color) {
    if (!selRange) return;
    const start=Math.min(selRange.start,selRange.end), len=Math.abs(selRange.end-selRange.start)+1;
    // Color can cover spaces (visual highlight), so don't split
    annotations.push({id:uid(), charIndex:start, length:len, type:'color', color});
    clearSelection(); renderLyrics(); saveState();
  }
  function addUnderlineMark(style) {
    if (!selRange) return;
    const start=Math.min(selRange.start,selRange.end), len=Math.abs(selRange.end-selRange.start)+1;
    const LINE_STYLES = ['wavy','solid','dashed','dotted','double'];
    const BOTTOM_SYMBOLS = ['triangle','dotbelow','accent'];
    const isLine = LINE_STYLES.includes(style);
    const isBottomSym = BOTTOM_SYMBOLS.includes(style);
    // Line styles mutually exclusive; bottom symbols (triangle/dot/accent) mutually exclusive; slur & breath independent
    if (isLine) {
      annotations = annotations.filter(a => !(a.type==='underline' && LINE_STYLES.includes(a.style) && rangesOverlap(a,start,len)));
    } else if (isBottomSym) {
      annotations = annotations.filter(a => !(a.type==='underline' && BOTTOM_SYMBOLS.includes(a.style) && rangesOverlap(a,start,len)));
    }
    // Split around spaces — don't mark whitespace
    let runStart = -1;
    for (let i = 0; i < len; i++) {
      const ch = getCharAt(start + i);
      if (ch && ch.trim()) {
        if (runStart < 0) runStart = start + i;
      } else {
        if (runStart >= 0) { annotations.push({id:uid(), charIndex:runStart, length:start+i-runStart, type:'underline', style}); runStart = -1; }
      }
    }
    if (runStart >= 0) annotations.push({id:uid(), charIndex:runStart, length:start+len-runStart, type:'underline', style});
    clearSelection(); renderLyrics(); saveState();
  }
  function getCharAt(absIdx) {
    // Get the character at absolute index in lyrics
    let i = 0;
    for (const ch of lyrics) { if (i === absIdx) return ch; i++; }
    // Include newlines in count
    if (absIdx < lyrics.length) return lyrics[absIdx];
    return null;
  }
  function clearUnderlineMarks() {
    if (!selRange) return;
    const start=Math.min(selRange.start,selRange.end), len=Math.abs(selRange.end-selRange.start)+1;
    annotations = annotations.filter(a => !(a.type==='underline' && rangesOverlap(a,start,len)));
    clearSelection(); renderLyrics(); saveState();
  }
  function rangesOverlap(ann, start, len) {
    return ann.charIndex < start+len && ann.charIndex+(ann.length||1) > start;
  }
  function deleteAnnotation(id) { annotations=annotations.filter(a=>a.id!==id); closeAnnRemoveMenu(); renderLyrics(); saveState(); }

  // Remap annotations when lyrics are edited — preserve marks on surviving text
  function remapAnnotations(oldText, newText) {
    if (!oldText || !newText) { annotations=[]; sections=[]; lineNotes=[]; return; }

    // Character-level LCS to build oldIndex → newIndex mapping
    const m = oldText.length, n = newText.length;
    // Use space-optimized LCS backtrack via Hirschberg-lite (row-by-row)
    // For typical lyrics (<3000 chars), full table is fine
    const dp = [];
    for (let i = 0; i <= m; i++) { dp[i] = new Uint16Array(n + 1); }
    for (let i = 1; i <= m; i++) {
      for (let j = 1; j <= n; j++) {
        if (oldText[i-1] === newText[j-1]) dp[i][j] = dp[i-1][j-1] + 1;
        else dp[i][j] = dp[i-1][j] > dp[i][j-1] ? dp[i-1][j] : dp[i][j-1];
      }
    }
    const oldToNew = {};
    let i = m, j = n;
    while (i > 0 && j > 0) {
      if (oldText[i-1] === newText[j-1]) { oldToNew[i-1] = j-1; i--; j--; }
      else if (dp[i-1][j] >= dp[i][j-1]) i--;
      else j--;
    }

    // Remap char-based annotations
    annotations = annotations.map(a => {
      const oldStart = a.charIndex;
      const len = a.length || 1;
      const surviving = [];
      for (let k = 0; k < len; k++) {
        const nIdx = oldToNew[oldStart + k];
        if (nIdx !== undefined) surviving.push(nIdx);
      }
      if (surviving.length === 0) return null;
      a.charIndex = surviving[0];
      a.length = surviving[surviving.length - 1] - surviving[0] + 1;
      return a;
    }).filter(Boolean);

    // Line-level LCS for sections and lineNotes
    const oldLines = oldText.split('\n');
    const newLines = newText.split('\n');
    const lm = oldLines.length, ln = newLines.length;
    const ldp = [];
    for (let li = 0; li <= lm; li++) { ldp[li] = new Uint16Array(ln + 1); }
    for (let li = 1; li <= lm; li++) {
      for (let lj = 1; lj <= ln; lj++) {
        if (oldLines[li-1] === newLines[lj-1]) ldp[li][lj] = ldp[li-1][lj-1] + 1;
        else ldp[li][lj] = ldp[li-1][lj] > ldp[li][lj-1] ? ldp[li-1][lj] : ldp[li][lj-1];
      }
    }
    const lineMap = {};
    let li = lm, lj = ln;
    while (li > 0 && lj > 0) {
      if (oldLines[li-1] === newLines[lj-1]) { lineMap[li-1] = lj-1; li--; lj--; }
      else if (ldp[li-1][lj] >= ldp[li][lj-1]) li--;
      else lj--;
    }
    sections = sections.map(s => {
      const nl = lineMap[s.lineIndex];
      return nl !== undefined ? { ...s, lineIndex: nl } : null;
    }).filter(Boolean);
    lineNotes = lineNotes.map(note => {
      const nl = lineMap[note.lineIndex];
      return nl !== undefined ? { ...note, lineIndex: nl } : null;
    }).filter(Boolean);
  }

  function showAnnRemoveMenu(e, removables) {
    const menu = document.getElementById('ann-remove-menu');
    menu.innerHTML = '';
    removables.forEach(r => {
      const btn = document.createElement('button');
      btn.className = 'ann-rm-item';
      const dot = document.createElement('span');
      dot.className = 'ann-rm-dot';
      dot.style.background = r.color || '#94A3B8';
      btn.appendChild(dot);
      btn.appendChild(document.createTextNode(r.label));
      btn.addEventListener('mousedown', (ev) => { ev.stopPropagation(); ev.preventDefault(); });
      btn.addEventListener('click', (ev) => { ev.stopPropagation(); deleteAnnotation(r.id); });
      menu.appendChild(btn);
    });
    const x = e.clientX, y = e.clientY;
    menu.style.left = x + 'px'; menu.style.top = y + 'px';
    menu.classList.add('visible');
    // Adjust if off-screen
    requestAnimationFrame(() => {
      const rect = menu.getBoundingClientRect();
      if (rect.right > window.innerWidth) menu.style.left = (window.innerWidth - rect.width - 8) + 'px';
      if (rect.bottom > window.innerHeight) menu.style.top = (y - rect.height) + 'px';
    });
  }
  function closeAnnRemoveMenu() { document.getElementById('ann-remove-menu').classList.remove('visible'); }

  // ─── Note Editor ──────────────────────────────────────
  function openNoteEditor() {
    if (!selRange) return;
    editingNoteId=null;
    const editor=document.getElementById('note-editor'), ta=document.getElementById('note-textarea');
    ta.value=''; noteBaseText=''; updateConfirmBtn(); setNoteStatus('ready');
    hideToolbar(); editor.classList.add('visible'); positionFloat(editor);
  }
  function setNoteStatus(state) {
    const text=document.getElementById('note-status-text'), wave=document.getElementById('rec-wave');
    text.classList.remove('recording'); wave.classList.remove('active');
    if (state==='recording'){text.textContent='正在聆听...';text.classList.add('recording');wave.classList.add('active');}
    else if (state==='ready'){text.textContent='准备中...';}
    else if (state==='idle'){text.textContent='已停止 · 可编辑';}
    else if (state==='unsupported'){text.textContent='浏览器不支持语音，请手动输入';}
    else if (state==='no-permission'){text.textContent='⚠ 麦克风权限被拒绝';}
  }
  async function startNoteRecording() {
    if (!recognition){setNoteStatus('unsupported');return;}
    if (isNoteRecording) return;
    if (!window.isSecureContext){setNoteStatus('no-permission');return;}
    try { const stream=await navigator.mediaDevices.getUserMedia({audio:true}); stream.getTracks().forEach(t=>t.stop()); } catch(err){setNoteStatus('no-permission');return;}
    noteBaseText=document.getElementById('note-textarea').value;
    isNoteRecording=true;
    document.getElementById('note-mic-toggle').classList.add('recording');
    document.getElementById('note-mic-label').textContent='停止';
    setNoteStatus('recording');
    try { recognition.start(); } catch(e){}
  }
  function stopNoteRecording() {
    isNoteRecording=false;
    if (recognition){try{recognition.stop();}catch(e){}}
    document.getElementById('note-mic-toggle').classList.remove('recording');
    document.getElementById('note-mic-label').textContent='录音';
    setNoteStatus('idle');
  }
  function toggleNoteRecording() { if (isNoteRecording) stopNoteRecording(); else startNoteRecording(); }
  function updateConfirmBtn() { document.getElementById('note-confirm-btn').disabled=!document.getElementById('note-textarea').value.trim(); }
  document.addEventListener('input', (e) => { if (e.target.id==='note-textarea'){if(isNoteRecording)noteBaseText=e.target.value;updateConfirmBtn();} });
  function cancelNoteEditor() { stopNoteRecording(); document.getElementById('note-editor').classList.remove('visible'); editingNoteId=null; clearSelection(); }
  function confirmNote() {
    const content=document.getElementById('note-textarea').value.trim(); if (!content) return;
    stopNoteRecording();
    if (editingNoteId) { const ann=annotations.find(a=>a.id===editingNoteId); if(ann) ann.content=content; editingNoteId=null; }
    else if (selRange) {
      const start=Math.min(selRange.start,selRange.end), len=Math.abs(selRange.end-selRange.start)+1;
      annotations.push({id:uid(), charIndex:start, length:len, type:'note', content});
    }
    document.getElementById('note-editor').classList.remove('visible');
    clearSelection(); renderLyrics(); saveState();
  }

  // ─── Popover ──────────────────────────────────────────
  function showPopover(e, ann) {
    activeNoteId=ann.id;
    const box=document.getElementById('popover-box'), overlay=document.getElementById('popover-overlay');
    document.getElementById('popover-text').textContent=ann.content;
    let anchor=(e.currentTarget&&e.currentTarget.getBoundingClientRect)?e.currentTarget:(e.target&&e.target.closest?e.target.closest('.note-tag'):null);
    let rect;
    if (anchor) rect=anchor.getBoundingClientRect();
    else if (e.touches&&e.touches[0]){const t=e.touches[0];rect={left:t.clientX,right:t.clientX,top:t.clientY,bottom:t.clientY};}
    else rect={left:100,right:100,top:100,bottom:100};
    box.style.display='block'; overlay.classList.add('active');
    requestAnimationFrame(() => {
      const bw=box.offsetWidth;
      let left=rect.left+window.scrollX;
      if (left+bw>window.innerWidth-12) left=window.innerWidth-bw-12;
      if (left<12) left=12;
      box.style.left=left+'px'; box.style.top=(rect.bottom+window.scrollY+8)+'px';
    });
  }

  // Scroll-sync: textarea and preview move together. Bound once on first use.
  let _scrollSyncBound = false;
  function bindLyricsScrollSync() {
    if (_scrollSyncBound) return;
    const ta = document.getElementById('lyrics-input');
    const pv = document.getElementById('lyrics-preview');
    if (!ta || !pv) return;
    _scrollSyncBound = true;
    let syncing = false;
    const sync = (src, dst) => {
      if (syncing) return;
      syncing = true;
      const sMax = src.scrollHeight - src.clientHeight;
      const dMax = dst.scrollHeight - dst.clientHeight;
      dst.scrollTop = sMax > 0 ? (src.scrollTop / sMax) * dMax : 0;
      requestAnimationFrame(() => { syncing = false; });
    };
    ta.addEventListener('scroll', () => sync(ta, pv));
    pv.addEventListener('scroll', () => sync(pv, ta));
  }

  function updateLyricsPreview() {
    const li = document.getElementById('lyrics-input');
    const pv = document.getElementById('lyrics-preview');
    const pvMeta = document.getElementById('lyrics-preview-meta');
    const liMeta = document.getElementById('lyrics-input-meta');
    if (!li || !pv) return;
    const raw = li.value;
    if (liMeta) liMeta.textContent = (raw.length || 0) + ' 字';
    if (!raw.trim()) {
      pv.innerHTML = '<div class="pv-empty">输入或粘贴歌词，这里会实时显示分行效果</div>';
      if (pvMeta) pvMeta.textContent = '0 行';
      return;
    }
    let processed;
    if (isEditMode) {
      processed = raw.split(/[\n\r]+/).map(s=>s.trim()).filter(s=>s.length>0).join('\n');
    } else {
      processed = autoSplitLyrics(raw);
    }
    const lines = processed ? processed.split('\n') : [];
    pv.innerHTML = lines.length
      ? lines.map(l => '<div class="pv-line">' + escapeHtml(l) + '</div>').join('')
      : '<div class="pv-empty">分行结果为空</div>';
    if (pvMeta) pvMeta.textContent = lines.length + ' 行';
  }

  function autoSplitLyrics(raw) {
    if (!raw) return '';
    const parts=raw.split(/[\n\r,.;:!?，。！？；：、…—]+/g)
      .map(s=>s.trim())
      .map(s=>s.replace(/^[\s\u3000"'""''`()（）【】\[\]《》「」『』<>]+/,''))
      .map(s=>s.replace(/[\s\u3000"'""''`()（）【】\[\]《》「」『』<>]+$/,''))
      .filter(s=>s.length>0);
    return parts.join('\n');
  }

  function importLyrics() {

      processed = autoSplitLyrics(raw);
    }
    if (!processed) return;
    songTitle=rawTitle;

    if (isEditMode) {
      if (lyrics !== processed) remapAnnotations(lyrics, processed);
      lyrics=processed;
    } else {
      lyrics=processed;

  function escapeHtml(s) { return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  const escHtml = escapeHtml;

  function renderLyricsInto(container, forExport=false) {
    container.innerHTML='';
    const lines=lyrics.split('\n');
    const hasAnyLineNote = forExport && lineNotes.length > 0;
    if (!hasAnyLineNote && forExport) container.classList.add('export-no-linenotes');
    else container.classList.remove('export-no-linenotes');
    let gi=0;

    lines.forEach((line, lineIdx) => {
      // Section label
      if (forExport) {
        const sec=sections.find(s=>s.lineIndex===lineIdx);
        if (sec) {
          const tag=SECTION_TAGS.find(t=>t.id===sec.tag);
          if (tag) {
            const lbl=document.createElement('div');
            lbl.className='export-section-label';
            lbl.textContent=`— ${tag.label} —`;
            container.appendChild(lbl);
          }
        }
      }

      // For export: wrap each line in a row (lyrics col + note col)
      let rowEl = container;
      let noteColEl = null;
      if (forExport) {
        const row = document.createElement('div');
        row.className = 'export-lrow';
        container.appendChild(row);
        rowEl = row;
        const noteCol = document.createElement('div');
        noteCol.className = 'export-lnote-col';
        const ln = lineNotes.find(n => n.lineIndex === lineIdx);
        if (ln && ln.text.trim()) {
          const noteSpan = document.createElement('span');
          noteSpan.textContent = ln.text.trim();
          noteCol.appendChild(noteSpan);
        }
        noteColEl = noteCol;
      }

      const lineDiv=document.createElement('div');
      lineDiv.className='lyric-line';
      const chars=Array.from(line);
      chars.forEach((ch,ci) => {
        const absIdx=gi+ci;
        const wrap=document.createElement('div'); wrap.className='char-wrap';
        const span=document.createElement('span'); span.className='lyric-char'; if(ch===' ')span.classList.add('lyric-space'); span.textContent=ch;
        const myAnn=getCharColorAnn(absIdx);
        if (myAnn) {
          span.classList.add('mark'); span.style.setProperty('--mark-color',myAnn.color);
          const pA=ci>0?getCharColorAnn(absIdx-1):null, nA=ci<chars.length-1?getCharColorAnn(absIdx+1):null;
          if (!pA||pA.id!==myAnn.id) span.classList.add('mark-start');
          if (!nA||nA.id!==myAnn.id) span.classList.add('mark-end');
        }
        const noteAnn=getCharNoteAnn(absIdx);
        if (noteAnn) {
          span.classList.add('has-note');
          const pn=ci>0?getCharNoteAnn(absIdx-1):null, nn=ci<chars.length-1?getCharNoteAnn(absIdx+1):null;
          const iS=!pn||pn.id!==noteAnn.id, iE=!nn||nn.id!==noteAnn.id;
          if (iS&&iE) span.classList.add('has-note-single');
          else if (iS) span.classList.add('has-note-start');
          else if (iE) span.classList.add('has-note-end');
          else span.classList.add('has-note-inner');
        }
        const ulAnnsEx=getCharUlAnns(absIdx);
        let inlineBefore = false, inlineAfter = false;
        if (ch.trim()) {
          ulAnnsEx.forEach(ua => {
            if (['wavy','solid','dashed','dotted','double'].includes(ua.style)) {
              span.classList.add('ul-'+ua.style);
            } else if (forExport && ua.style === 'breath-before') {
              // In export, render breath-before as an inline mark BEFORE the char,
              // sitting between chars so it's unambiguous which side it belongs to
              inlineBefore = true;
            } else if (forExport && ua.style === 'breath') {
              inlineAfter = true;
            } else {
              const sym=document.createElement('span');
              sym.className='sym-mark sym-'+ua.style;
              wrap.appendChild(sym);
            }
          });
        }
        const tcAnn2=getCharTextColorAnn(absIdx);
        if (tcAnn2) span.style.color=tcAnn2.color;
        const fontAnn2=getCharFontAnn(absIdx);
        if (fontAnn2) { const fo=FONT_OPTIONS.find(f=>f.key===fontAnn2.fontKey); if(fo) span.style.fontFamily=fo.family; }
        if (getCharBoldAnn(absIdx)) span.style.fontWeight='700';
        if (getCharItalicAnn(absIdx)) span.style.fontStyle='italic';
        wrap.appendChild(span);
        if (noteAnn) {
          const nn2=ci<chars.length-1?getCharNoteAnn(absIdx+1):null;
          if (!nn2||nn2.id!==noteAnn.id) {
            const tag=document.createElement('span'); tag.className='note-tag'; tag.textContent=noteAnn.content;
            wrap.appendChild(tag);
          }
        }
        if (inlineBefore) {
          const b=document.createElement('span');
          b.className='inline-breath inline-breath-before';
          b.textContent='∨';
          lineDiv.appendChild(b);
        }
        lineDiv.appendChild(wrap);
        if (inlineAfter) {
          const b=document.createElement('span');
          b.className='inline-breath inline-breath-after';
          b.textContent='∨';
          lineDiv.appendChild(b);
        }
      });
      gi+=line.length+1;
      rowEl.appendChild(lineDiv);
      if (noteColEl) rowEl.appendChild(noteColEl);
    });
  }

  function getCanvasOptions(element, scale=2) {
    const rect=element.getBoundingClientRect();
    return {
      scale, useCORS:true,
      backgroundColor: getComputedStyle(element).backgroundColor||'#FFFFFF',
      width:Math.ceil(rect.width), height:Math.ceil(element.scrollHeight),
      windowWidth:Math.ceil(rect.width), windowHeight:Math.ceil(element.scrollHeight),
      scrollX:0, scrollY:-window.scrollY
    };
  }

  function buildPdfPages() {
    const sheet=document.getElementById('export-sheet');
    const lyricBody=document.getElementById('export-lyrics-body');
    const notesSection=sheet.querySelector('.export-notes-section');
    const lineEls=lyricBody?Array.from(lyricBody.querySelectorAll('.export-lrow,.export-section-label')):[];
    if (!lineEls.length) { const only=sheet.cloneNode(true); ['position','opacity','left','top','visibility'].forEach(p=>only.style[p]=''); return [only]; }
    const header=sheet.querySelector('.export-header'), footer=sheet.querySelector('.export-footer');
    const notesSectionHTML=notesSection?notesSection.outerHTML:'';
    const sheetStyle=getComputedStyle(sheet);
    const pageHeight=842;
    const usableH=pageHeight-parseFloat(sheetStyle.paddingTop)-parseFloat(sheetStyle.paddingBottom)-header.offsetHeight-footer.offsetHeight-40;
    const offscreen=(el)=>{el.style.cssText='position:fixed;left:-99999px;top:0;opacity:1;pointer-events:none;z-index:-1;';}
    const clearStage=(el)=>{['position','left','top','opacity','pointerEvents','zIndex','visibility'].forEach(p=>el.style[p]='');}
    const createShell=(includeNotes=false)=>{
      const p=sheet.cloneNode(false); p.className=sheet.className;
      p.innerHTML=`<div class="export-header">${header.innerHTML}</div><div class="export-lyrics"></div>${includeNotes?notesSectionHTML:''}<div class="export-footer">${footer.innerHTML}</div>`;
      return p;
    };
    const pages=[]; let cur=createShell(); offscreen(cur); document.body.appendChild(cur); let curL=cur.querySelector('.export-lyrics');
    const snap=(isLast=false)=>{
      // On last page: rebuild with notes section included so it flows naturally
      if (isLast && notesSectionHTML) {
        cur.remove();
        cur=createShell(true); offscreen(cur); document.body.appendChild(cur);
        curL=cur.querySelector('.export-lyrics');
        // re-append all children of the page's lyrics that we already built
        Array.from(pages.length>0?[]:[] ).forEach(c=>curL.appendChild(c)); // placeholder — handled below
      }
      const s=cur.cloneNode(true); clearStage(s); pages.push(s);
    };
    lineEls.forEach((line, idx)=>{
      curL.appendChild(line.cloneNode(true));
      const isLast = idx === lineEls.length - 1;
      if (!isLast && curL.scrollHeight>usableH && curL.children.length>1) {
        curL.removeChild(curL.lastChild); snap(); cur.remove();
        cur=createShell(); offscreen(cur); document.body.appendChild(cur); curL=cur.querySelector('.export-lyrics');
        curL.appendChild(line.cloneNode(true));
      }
    });
    // Final page: inject notes section into the cloned shell
    if (notesSectionHTML) {
      const lastFooter = cur.querySelector('.export-footer');
      const noteEl = document.createElement('div');
      noteEl.innerHTML = notesSectionHTML;
      cur.insertBefore(noteEl.firstElementChild, lastFooter);
    }
    const finalSnap = cur.cloneNode(true); clearStage(finalSnap); pages.push(finalSnap);
    cur.remove(); return pages;
  }

  async function confirmExport() {
    const sheet=document.getElementById('export-sheet'), btn=document.getElementById('preview-confirm-btn');
    btn.disabled=true; btn.textContent='生成中...';
    try {
      const d=new Date(), dstr=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
      const safeTitle=(songTitle||'lyrics').replace(/[\/:*?"<>|]/g,'_').slice(0,40);
      if (exportFormat==='pdf') {
        const {jsPDF}=window.jspdf, pdf=new jsPDF('p','mm','a4');
        const pW=pdf.internal.pageSize.getWidth(), pH=pdf.internal.pageSize.getHeight();
        const pages=buildPdfPages();
        for (let i=0;i<pages.length;i++) {
          const page=pages[i];
          page.style.cssText='position:fixed;left:-99999px;top:0;opacity:1;pointer-events:none;z-index:-1;';
          document.body.appendChild(page);
          await new Promise(r=>requestAnimationFrame(r));
          const pc=await html2canvas(page,getCanvasOptions(page,2.5));
          const rH=(pc.height*pW)/pc.width;
          if (i>0) pdf.addPage();
          pdf.addImage(pc.toDataURL('image/png'),'PNG',0,0,pW,Math.min(pH,rH));
          page.remove();
        }
        pdf.save(`LyricNote_${safeTitle}_${dstr}.pdf`);
      } else {
        const canvas=await html2canvas(sheet,getCanvasOptions(sheet,3));
        const link=document.createElement('a');
        link.download=`LyricNote_${safeTitle}_${dstr}.png`;
        link.href=canvas.toDataURL('image/png'); link.click();
      }
    } catch(err) { console.error(err); alert('导出失败，请重试'); }
    btn.disabled=false;
    btn.textContent=exportFormat==='pdf'?'下载 PDF':'下载图片';
    closePreview();
  }

  function uid() { return Math.random().toString(36).slice(2,9); }

  // ─── Notes: state ─────────────────────────────────────
  let notesSaveTimer = null;
  let marginNotesVisible = false;
  let bottomNotesVisible = false;
  let lineNotes = [];       // {id, lineIndex, text}
  let marginW = 210;
  let bottomNotesH = 150;
  let activeLineEditor = null; // {lineIndex, el}

  function initNotesPanel() {
    // Notes content is now loaded via loadProject(), just set up event listeners
    const ta = document.getElementById('notes-textarea');
    ta.addEventListener('input', () => { updateNotesCount(); clearTimeout(notesSaveTimer); notesSaveTimer = setTimeout(saveNotes, 700); });

    // Load dimensions
    try { const w = parseInt(localStorage.getItem('lyricnote_margin_w'),10); if (w>=120&&w<=500) marginW=w; } catch(e) {}
    try { const h = parseInt(localStorage.getItem('lyricnote_bottom_h'),10); if (h>=60&&h<=600) bottomNotesH=h; } catch(e) {}
    document.documentElement.style.setProperty('--margin-w', marginW+'px');
    document.documentElement.style.setProperty('--bottom-notes-h', bottomNotesH+'px');

    // Bottom notes resize (drag handle)
    const bnHandle = document.getElementById('bottom-notes-handle');
    bnHandle.addEventListener('mousedown', (e) => {
      e.preventDefault();
      const startY = e.clientY, startH = bottomNotesH;
      bnHandle.classList.add('dragging');
      const onMove = (e) => {
        const newH = Math.max(60, Math.min(600, startH - (e.clientY - startY)));
        bottomNotesH = newH;
        document.documentElement.style.setProperty('--bottom-notes-h', newH+'px');
        document.getElementById('bottom-notes').style.height = newH+'px';
        try { localStorage.setItem('lyricnote_bottom_h', newH); } catch(e) {}
      };
      const onUp = () => { bnHandle.classList.remove('dragging'); document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });

  function openLineNoteEditor(lineIdx, cellEl) {
    if (activeLineEditor && activeLineEditor.lineIdx === lineIdx) return;
    if (activeLineEditor) {
      activeLineEditor = null;
      clearAllHighlights();
      renderLyrics(); // re-render to reset

      if (!cellEl) return;

    cellEl.classList.add('editing');
    cellEl.innerHTML = '';

    const note = lineNotes.find(n => n.lineIndex === lineIdx);
    const ta = document.createElement('textarea');
    ta.className = 'margin-note-input';
    ta.value = note ? note.text : '';
    ta.placeholder = '这行的练唱笔记...\n（Ctrl+Enter 保存）';

    const footer = document.createElement('div');

    const micId = 'margin-mic-' + lineIdx;

    footer.appendChild(micBtn);
    footer.appendChild(cancelBtn);
    footer.appendChild(saveBtn);

    cellEl.appendChild(footer);

    activeLineEditor = { lineIdx, rowEl: cellEl };

    ta.addEventListener('keydown', (e) => {

  function saveLineNote(lineIdx, text) {

  function updateNotesCount() {

  function clearNotes() {
    if (!document.getElementById('notes-textarea').value.trim()) return;

  function insertNote(text) {
    const ta = document.getElementById('notes-textarea');
    const start = ta.selectionStart, end = ta.selectionEnd;
    const before = ta.value.slice(0, start), after = ta.value.slice(end);
    const needsNL = before.length > 0 && !before.endsWith('\n');
    const ins = (needsNL ? '\n' : '') + text;
    ta.value = before + ins + after;
    const pos = before.length + ins.length;
    ta.setSelectionRange(pos, pos);
    ta.focus(); ta.dispatchEvent(new Event('input'));
  }
  function insertNoteNumbered() {
    const ta = document.getElementById('notes-textarea');
    let maxNum = 0;
    ta.value.split('\n').forEach(l => { const m = l.match(/^(\d+)\./); if (m) maxNum = Math.max(maxNum, parseInt(m[1],10)); });
    insertNote(`${maxNum + 1}. `);
  }

  // ─── Notes text parser (shared for export & preview) ──
  function parseNotesText(text, prefix) {
    return text.split('\n').map(line => {
      const t = line.trim();
      if (!t) return `<span class="${prefix}-blank"></span>`;
      if (/^[─—]{3,}$/.test(t)) return `<hr class="${prefix}-rule">`;
      if (/^[•·]\s/.test(t)) return `<span class="${prefix}-line ${prefix}-bullet">${escapeHtml(line)}</span>`;
      if (/^\d+\.\s/.test(t)) return `<span class="${prefix}-line ${prefix}-numbered">${escapeHtml(line)}</span>`;
      if (/^[☆★✦✧]\s/.test(t)) return `<span class="${prefix}-line ${prefix}-star">${escapeHtml(line)}</span>`;
      if (/^[→⇒➜➡]\s/.test(t)) return `<span class="${prefix}-line ${prefix}-arrow">${escapeHtml(line)}</span>`;
      return `<span class="${prefix}-line">${escapeHtml(line)}</span>`;
    }).join('');
  }
  function renderNotesAsExportHTML(text) { return parseNotesText(text, 'n'); }

  function showLoginScreen() {
    document.getElementById('login-screen').style.display = '';
    document.getElementById('home-screen').style.display = 'none';
